<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Okuma Parts Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #F5F5F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #2C2A29;
    }

    /* ─── CONTENT AREA ────────────────────────────────────────── */
    .auth-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 0 120px;
    }

    /* ─── CARD ────────────────────────────────────────────────── */
    .auth-card {
      width: 480px;
      max-width: calc(100% - 48px);
      padding: 40px;
      background: #FFFFFF;
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.08);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ─── TITLE SECTION ───────────────────────────────────────── */
    .auth-card__head {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-card__title {
      font-size: 24px;
      font-weight: 700;
      color: #2C2A29;
      line-height: 1.0;
    }

    .auth-card__body {
      font-size: 15px;
      font-weight: 300;
      color: #757575;
      line-height: 1.5;
    }

    /* ─── FORM SECTION ────────────────────────────────────────── */
    .auth-card__form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ────────────────────────────────────────────────── -->
  <div id="okuma-auth-header"></div>

  <!-- ─── CONTENT ───────────────────────────────────────────────── -->
  <main class="auth-content">
    <div class="auth-card">

      <!-- Back link (arrow-left-to-line icon) -->
      <a href="login.html" class="back-link">
        <svg class="back-link__icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 3V13" stroke="#005EB8" stroke-width="2" stroke-linecap="round"/>
          <path d="M14 8H5.5M5.5 8L9 4.5M5.5 8L9 11.5" stroke="#005EB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Login
      </a>

      <!-- Title + body -->
      <div class="auth-card__head">
        <h1 class="auth-card__title">Reset Your Password</h1>
        <p class="auth-card__body">Enter your registered email address and we'll send you a link to reset your password.</p>
      </div>

      <!-- Email field + button -->
      <form class="auth-card__form" onsubmit="return false;">
        <div class="field">
          <label class="field__label" for="email">Email Address</label>
          <input
            class="field__input"
            type="email"
            id="email"
            name="email"
            placeholder="name@company.com"
            autocomplete="email"
          />
        </div>

        <a href="forgot-password-inbox.html" class="btn--primary">Send Reset Link</a>
      </form>

    </div>
  </main>

  <!-- ─── FOOTER ────────────────────────────────────────────────── -->
  <div id="okuma-auth-footer"></div>

  <script src="components.js"></script>
</body>
</html>
