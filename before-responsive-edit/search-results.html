<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results — Okuma Parts Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F9F9F9;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── MAIN AREA ── */
    .main-area { flex: 1; padding: 32px; }

    /* Page head */
    .sr-count { font-size: 13px; font-weight: 400; color: #717171; line-height: 1.2; }
    .sr-title { font-size: 26px; font-weight: 700; color: #1A1A1A; margin-top: 8px; line-height: 1.2; }

    /* Two-column layout */
    .sr-layout { display: flex; gap: 28px; margin-top: 28px; align-items: flex-start; }

    /* ── FILTERS PANEL (LEFT) ── */
    .filters {
      width: 240px;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 4px;
      padding: 20px;
    }
    .filters__head { display: flex; align-items: center; gap: 8px; }
    .filters__head svg { width: 16px; height: 16px; color: #1A1A1A; flex-shrink: 0; }
    .filters__head-label { font-size: 14px; font-weight: 700; color: #1A1A1A; }

    .filters__section-label {
      font-size: 11px; font-weight: 700; color: #717171;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .filters__section--cat { margin-top: 20px; }
    .filters__section--mc, .filters__section--price { margin-top: 24px; }

    .filters__opts { display: flex; flex-direction: column; gap: 11px; margin-top: 12px; }
    .check {
      display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
    }
    .check input {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid #808080; border-radius: 3px; background: #fff;
      cursor: pointer; position: relative; margin: 0;
    }
    .check input:checked { background: #005EB8; border-color: #005EB8; }
    .check input:checked::after {
      content: ''; position: absolute; left: 4.5px; top: 1.5px;
      width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .check__label { font-size: 13px; font-weight: 500; color: #1A1A1A; }

    /* Price range */
    .price-range {
      width: 100%; margin-top: 14px;
      appearance: none; -webkit-appearance: none;
      height: 4px; border-radius: 2px; background: #E0E0E0; outline: none;
      accent-color: #005EB8; cursor: pointer;
    }
    .price-range::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #005EB8; cursor: pointer; border: none;
    }
    .price-range::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #005EB8; cursor: pointer; border: none;
    }
    .price-range::-moz-range-track { height: 4px; border-radius: 2px; background: #E0E0E0; }
    .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .price-row__min { font-size: 12px; font-weight: 400; color: #717171; }
    .price-row__max { font-size: 12px; font-weight: 500; color: #1A1A1A; }

    /* ── RESULTS AREA (RIGHT) ── */
    .results { flex: 1; min-width: 0; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .part-card {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .part-card__media {
      width: 100%; height: 160px; background: #F5F5F5;
      display: flex; align-items: center; justify-content: center;
    }
    .part-card__media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .part-card__body { padding: 16px; }
    .part-card__number { font-size: 11px; font-weight: 700; color: #005EB8; }
    .part-card__name { font-size: 14px; font-weight: 700; color: #1A1A1A; margin-top: 4px; }
    .part-card__row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: 12px;
    }
    .part-card__price { font-size: 18px; font-weight: 700; color: #1A1A1A; }

    .add-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: #005EB8; color: #fff; border: none; border-radius: 4px;
      height: 36px; padding: 0 14px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.88; }
    .add-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .add-btn--disabled, .add-btn:disabled {
      background: #9E9E9E; cursor: not-allowed; opacity: 1;
    }
    .add-btn--disabled:hover, .add-btn:disabled:hover { opacity: 1; }

    /* Empty state */
    .no-results {
      grid-column: 1 / -1;
      padding: 48px 20px; text-align: center;
      font-size: 14px; color: #717171; font-weight: 400;
    }

    /* Pagination */
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 28px; }
    .page-btn {
      min-width: 32px; height: 32px; padding: 0 6px;
      background: #fff; border: 1px solid #E5E5E5; border-radius: 4px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px; font-weight: 500; color: #1A1A1A; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .page-btn:hover { border-color: #005EB8; }
    .page-btn.active { background: #005EB8; border-color: #005EB8; color: #fff; }
  </style>
</head>
<body>

  <!-- ────────────── HEADER ────────────── -->
  <div id="okuma-header"></div>

  <!-- ────────────── PAGE ────────────── -->
  <div class="app-body-shell">

    <!-- SIDEBAR (no active item) -->
    <div id="okuma-sidebar" data-active=""></div>

    <!-- MAIN AREA -->
    <main class="main-area">

      <div class="sr-count" id="srCount">0 results found</div>
      <h1 class="sr-title" id="srTitle">All Parts</h1>

      <div class="sr-layout">

        <!-- FILTERS PANEL -->
        <aside class="filters">
          <div class="filters__head">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1.5 2.5h13L9.5 8.5V13l-3 1.5V8.5L1.5 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
            <span class="filters__head-label">Filters</span>
          </div>

          <!-- Category -->
          <div class="filters__section filters__section--cat">
            <div class="filters__section-label">Filter by Category</div>
            <div class="filters__opts" id="catOpts">
              <label class="check"><input type="checkbox" data-filter="category" value="Spindle Assembly"><span class="check__label">Spindle Assembly</span></label>
              <label class="check"><input type="checkbox" data-filter="category" value="Coolant System"><span class="check__label">Coolant System</span></label>
              <label class="check"><input type="checkbox" data-filter="category" value="Axis Drive"><span class="check__label">Axis Drive</span></label>
              <label class="check"><input type="checkbox" data-filter="category" value="Electrical Cabinet"><span class="check__label">Electrical Cabinet</span></label>
            </div>
          </div>

          <!-- Machine compatibility -->
          <div class="filters__section filters__section--mc">
            <div class="filters__section-label">Machine Compatibility</div>
            <div class="filters__opts" id="mcOpts">
              <label class="check"><input type="checkbox" data-filter="machine" value="GENOS M560-V"><span class="check__label">GENOS M560-V</span></label>
              <label class="check"><input type="checkbox" data-filter="machine" value="MULTUS U3000"><span class="check__label">MULTUS U3000</span></label>
              <label class="check"><input type="checkbox" data-filter="machine" value="LB2000 EX III"><span class="check__label">LB2000 EX III</span></label>
            </div>
          </div>

          <!-- Price range -->
          <div class="filters__section filters__section--price">
            <div class="filters__section-label">Price Range</div>
            <input type="range" class="price-range" id="priceRange" min="0" max="1000" value="1000">
            <div class="price-row">
              <span class="price-row__min">$0</span>
              <span class="price-row__max" id="priceMax">$1000</span>
            </div>
          </div>
        </aside>

        <!-- RESULTS -->
        <section class="results">
          <div class="cards-grid" id="cardsGrid"></div>
          <div class="pagination" id="pagination"></div>
        </section>

      </div>
    </main>
  </div>

  <script src="components.js"></script>

  <!-- ────────────── PAGE LOGIC ────────────── -->
  <script>
    (function () {
      'use strict';

      /* Parts dataset */
      var PARTS = [
        { name: 'Spindle Bearing Unit',    number: 'E4809-045-017-A', category: 'Spindle Assembly',   machine: 'GENOS M560-V',  price: 247.50, img: 'product-spindle-bearing.png', inStock: true },
        { name: 'Spindle Bearing Unit',    number: 'E4809-045-033-B', category: 'Spindle Assembly',   machine: 'MULTUS U3000',  price: 247.50, img: 'product-spindle-bearing.png', inStock: true },
        { name: 'Angular Contact Bearing', number: 'E4809-045-008-C', category: 'Spindle Assembly',   machine: 'LB2000 EX III', price: 312.00, img: 'product-plate-bearing.png',    inStock: true },
        { name: 'Spindle Housing Seal',    number: 'E4809-061-021-A', category: 'Spindle Assembly',   machine: 'GENOS M560-V',  price: 189.00, img: 'product-oring-seal.png',       inStock: false },
        { name: 'O-Ring Seal Kit',         number: 'E4809-045-090-K', category: 'Spindle Assembly',   machine: 'GENOS M560-V',  price: 42.50,  img: 'product-oring-seal.png',       inStock: true },
        { name: 'Spindle Bearing Unit',    number: 'E4809-061-022-B', category: 'Spindle Assembly',   machine: 'LB2000 EX III', price: 247.50, img: 'product-spindle-bearing.png', inStock: true },
        { name: 'Coolant Pump Assembly',   number: 'C4809-045-022-B', category: 'Coolant System',     machine: 'MULTUS U3000',  price: 185.00, img: 'product-coolant-pump.png',     inStock: true },
        { name: 'Coolant Nozzle Kit',      number: 'C4809-058-001-A', category: 'Coolant System',     machine: 'GENOS M560-V',  price: 64.00,  img: 'product-coolant-pump.png',     inStock: true },
        { name: 'Hydraulic Filter Kit',    number: 'C4809-058-077-E', category: 'Coolant System',     machine: 'MULTUS U3000',  price: 98.00,  img: 'product-coolant-pump.png',     inStock: true },
        { name: 'Servo Drive Belt',        number: 'A4809-072-014-D', category: 'Axis Drive',         machine: 'LB2000 EX III', price: 62.50,  img: 'product-servo-belt.png',       inStock: true },
        { name: 'Servo Drive Unit',        number: 'A4809-072-101-A', category: 'Axis Drive',         machine: 'MULTUS U3000',  price: 342.50, img: 'product-servo-belt.png',       inStock: true },
        { name: 'Ball Screw Assembly',     number: 'A4809-072-205-C', category: 'Axis Drive',         machine: 'LB2000 EX III', price: 498.00, img: 'product-plate-bearing.png',    inStock: true },
        { name: 'Control Relay Module',    number: 'EC809-033-011-A', category: 'Electrical Cabinet', machine: 'MULTUS U3000',  price: 128.00, img: 'product-servo-belt.png',       inStock: true },
        { name: 'Proximity Sensor',        number: 'EC809-033-044-B', category: 'Electrical Cabinet', machine: 'GENOS M560-V',  price: 76.00,  img: 'product-oring-seal.png',       inStock: true }
      ];

      var PAGE_SIZE = 6;

      /* State */
      var query = '';
      var queryFiltered = [];   /* parts matching the URL query */
      var currentPage = 1;

      /* DOM refs */
      var elCount = document.getElementById('srCount');
      var elTitle = document.getElementById('srTitle');
      var elGrid  = document.getElementById('cardsGrid');
      var elPag   = document.getElementById('pagination');
      var elPriceRange = document.getElementById('priceRange');
      var elPriceMax   = document.getElementById('priceMax');

      function getParam(name) {
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
        return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      /* Checked values for a filter group */
      function checkedValues(filter) {
        var boxes = document.querySelectorAll('input[data-filter="' + filter + '"]:checked');
        return Array.prototype.map.call(boxes, function (b) { return b.value; });
      }

      /* Apply the live filters (category, machine, price) to the query-filtered set */
      function applyFilters() {
        var cats = checkedValues('category');
        var machines = checkedValues('machine');
        var maxPrice = parseInt(elPriceRange.value, 10);

        return queryFiltered.filter(function (p) {
          if (cats.length && cats.indexOf(p.category) === -1) return false;
          if (machines.length && machines.indexOf(p.machine) === -1) return false;
          if (p.price > maxPrice) return false;
          return true;
        });
      }

      function cardHTML(p) {
        var btn;
        if (p.inStock) {
          btn = '<button class="add-btn" type="button">' +
            '<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1h2.2l2.1 10.4a1.5 1.5 0 0 0 1.5 1.2h7.6a1.5 1.5 0 0 0 1.47-1.2L19 4.5H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="17" r="1.3" fill="currentColor"/><circle cx="16" cy="17" r="1.3" fill="currentColor"/></svg>' +
            '<span>ADD TO CART</span></button>';
        } else {
          btn = '<button class="add-btn add-btn--disabled" type="button" disabled>OUT OF STOCK</button>';
        }
        return '<div class="part-card">' +
          '<div class="part-card__media"><img src="' + p.img + '" alt="' + escapeHtml(p.name) + '"></div>' +
          '<div class="part-card__body">' +
            '<div class="part-card__number">' + escapeHtml(p.number) + '</div>' +
            '<div class="part-card__name">' + escapeHtml(p.name) + '</div>' +
            '<div class="part-card__row">' +
              '<span class="part-card__price">$' + p.price.toFixed(2) + '</span>' +
              btn +
            '</div>' +
          '</div>' +
        '</div>';
      }

      /* Add-to-cart feedback */
      function wireAddButtons() {
        var btns = elGrid.querySelectorAll('.add-btn:not([disabled])');
        Array.prototype.forEach.call(btns, function (btn) {
          btn.addEventListener('click', function () {
            if (btn.dataset.busy === '1') return;
            btn.dataset.busy = '1';
            var orig = btn.innerHTML;
            btn.innerHTML = '<span>✓ Added</span>';
            setTimeout(function () {
              btn.innerHTML = orig;
              btn.dataset.busy = '';
            }, 1200);
          });
        });
      }

      function renderPagination(totalPages) {
        elPag.innerHTML = '';
        if (totalPages <= 1) return;
        for (var i = 1; i <= totalPages; i++) {
          (function (page) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'page-btn' + (page === currentPage ? ' active' : '');
            b.textContent = page;
            b.addEventListener('click', function () {
              currentPage = page;
              renderResults();
            });
            elPag.appendChild(b);
          })(i);
        }
      }

      function renderResults() {
        var filtered = applyFilters();

        /* count (current filtered set) */
        elCount.textContent = filtered.length + ' result' + (filtered.length === 1 ? '' : 's') + ' found';

        var totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;

        var start = (currentPage - 1) * PAGE_SIZE;
        var slice = filtered.slice(start, start + PAGE_SIZE);

        if (slice.length === 0) {
          elGrid.innerHTML = '<div class="no-results">No parts match your filters.</div>';
        } else {
          elGrid.innerHTML = slice.map(cardHTML).join('');
          wireAddButtons();
        }

        renderPagination(totalPages);
      }

      /* ---- init ---- */
      query = getParam('q').trim();

      if (query) {
        elTitle.textContent = 'Search Results for "' + query + '"';
        var q = query.toLowerCase();
        queryFiltered = PARTS.filter(function (p) {
          return p.name.toLowerCase().indexOf(q) !== -1 ||
                 p.number.toLowerCase().indexOf(q) !== -1;
        });
      } else {
        elTitle.textContent = 'All Parts';
        queryFiltered = PARTS.slice();
      }

      /* filter listeners */
      var checkboxes = document.querySelectorAll('input[data-filter]');
      Array.prototype.forEach.call(checkboxes, function (cb) {
        cb.addEventListener('change', function () {
          currentPage = 1;
          renderResults();
        });
      });
      elPriceRange.addEventListener('input', function () {
        elPriceMax.textContent = '$' + elPriceRange.value;
        currentPage = 1;
        renderResults();
      });

      renderResults();
    })();
  </script>

</body>
</html>
