<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Detail — Okuma Parts Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #FFFFFF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .main-area {
      flex: 1;
      min-width: 0;
      padding: 32px 32px 64px;
      display: flex;
      flex-direction: column;
    }

    /* BREADCRUMB */
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #717171; margin-bottom: 20px; }
    .breadcrumb a { color: #717171; text-decoration: none; }
    .breadcrumb a:hover { color: #005EB8; text-decoration: underline; }
    .breadcrumb__sep { color: #C4C4C4; }
    .breadcrumb__current { color: #1A1A1A; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }

    /* PAGE HEADER */
    .page-head { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
    .page-head__back {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 4px; border: 1px solid #DEDEDE;
      background: #fff; color: #1A1A1A; text-decoration: none; flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .page-head__back:hover { border-color: #005EB8; background: #F0F6FF; color: #005EB8; }
    .page-head__back svg { width: 16px; height: 16px; }
    .page-head__info { flex: 1; min-width: 0; }
    .page-head__title { font-size: 24px; font-weight: 800; color: #1A1A1A; letter-spacing: -0.3px; }
    .page-head__meta { font-size: 13px; color: #717171; margin-top: 3px; display: block; }

    /* STATUS BADGES */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 2px; padding: 5px 12px;
      font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-badge--open         { background: #EEF4FF; border: 0.5px solid #4A90D9; color: #4A90D9; }
    .status-badge--open .dot    { background: #4A90D9; }
    .status-badge--responded    { background: #EDF9FA; border: 0.5px solid #2DB8C5; color: #2099A5; }
    .status-badge--responded .dot { background: #2DB8C5; }
    .status-badge--closed       { background: #F5F5F5; border: 0.5px solid #9E9E9E; color: #9E9E9E; }
    .status-badge--closed .dot  { background: #9E9E9E; }

    /* QUOTE INFO STRIP — Option A */
    .quote-info-strip {
      display: flex; align-items: center;
      background: #fff; border: 1px solid #E2E2E2;
      border-left: 3px solid #005EB8; border-radius: 4px;
      height: 48px; margin-bottom: 20px; overflow: hidden;
    }
    .quote-info-strip__field {
      display: flex; align-items: baseline; gap: 6px;
      padding: 0 20px; flex: 1;
    }
    .quote-info-strip__field:first-child { padding-left: 16px; }
    .quote-info-strip__field + .quote-info-strip__field { border-left: 1px solid #E2E2E2; }
    .quote-info-strip__lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: #9E9E9E; white-space: nowrap; flex-shrink: 0;
    }
    .quote-info-strip__val {
      font-size: 13px; font-weight: 600; color: #1A1A1A;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .quote-info-strip__val--blue { color: #005EB8; }

    /* BANNERS */
    .alert-banner {
      display: flex; align-items: flex-start; gap: 10px;
      border-radius: 4px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; font-weight: 500; line-height: 1.5;
    }
    .alert-banner svg { flex-shrink: 0; margin-top: 1px; }
    .alert-banner--warn   { background: #FFF9EF; border: 1px solid #FFD580; color: #7A4F00; }
    .alert-banner--urgent { background: #FFF0F0; border: 1px solid #FFC0C0; color: #C0392B; }
    .alert-banner--grey   { background: #F5F5F5; border: 1px solid #DEDEDE; color: #555; }

    /* TIMELINE */
    .timeline-card { border: 1px solid #DEDEDE; border-radius: 4px; padding: 28px 40px; margin-bottom: 20px; }
    .timeline { display: flex; align-items: flex-start; position: relative; }
    .timeline-track { position: absolute; top: 13px; left: 14px; right: 14px; height: 2px; background: #EBEBEB; z-index: 0; }
    .timeline-track__fill { height: 100%; background: #005EB8; }
    .timeline-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 9px; position: relative; z-index: 1; }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #fff; border: 2px solid #DEDEDE; }
    .step-dot--done    { background: #005EB8; border-color: #005EB8; color: #fff; }
    .step-dot--active  { background: #005EB8; border-color: #005EB8; color: #fff; box-shadow: 0 0 0 4px rgba(0,94,184,0.14); }
    .step-dot--pending { background: #fff; border-color: #DEDEDE; color: #BDBDBD; }
    .step-label { font-size: 12px; font-weight: 600; color: #9E9E9E; text-align: center; line-height: 1.3; }
    .step-label--done, .step-label--active { color: #1A1A1A; }
    .step-date { font-size: 11px; color: #B0B0B0; text-align: center; line-height: 1.3; margin-top: -4px; }
    .step-date--done, .step-date--active { color: #717171; }

    /* TWO COLUMN LAYOUT */
    .detail-layout { display: flex; gap: 20px; align-items: flex-start; }
    .detail-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 20px; }
    .detail-aside { width: 308px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }

    /* CARDS */
    .det-card { border: 1px solid #DEDEDE; border-radius: 4px; overflow: hidden; }
    .det-card__head {
      padding: 12px 20px; background: #F5F5F5; border-bottom: 1px solid #DEDEDE;
      font-size: 11px; font-weight: 700; color: #717171; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .det-card__body { padding: 20px; }

    /* ITEMS TABLE */
    .items-tbl { width: 100%; border-collapse: collapse; min-width: 520px; }
    .items-tbl th {
      padding: 10px 16px; font-size: 11px; font-weight: 700; color: #9E9E9E;
      text-transform: uppercase; letter-spacing: 0.3px; text-align: left;
      border-bottom: 1px solid #DEDEDE; white-space: nowrap; background: #FAFAFA;
    }
    .items-tbl th.r { text-align: right; }
    .items-tbl td { padding: 14px 16px; border-bottom: 1px solid #F0F0F0; vertical-align: middle; font-size: 13px; }
    .items-tbl tbody tr:last-child td { border-bottom: none; }
    .items-tbl tbody tr:hover { background: #FAFAFA; }
    .it-name    { font-size: 13px; font-weight: 700; color: #1A1A1A; }
    .it-pn      { font-size: 11px; color: #9E9E9E; margin-top: 2px; }
    .ordered-for-label { font-size: 11px; font-weight: 700; color: #717171; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    .ordered-for-strip { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: #EAF2FF; border-left: 3px solid #005EB8; border-radius: 2px; }
    .ordered-for-strip__mach { font-size: 14px; font-weight: 700; color: #005EB8; }
    .ordered-for-strip__sep  { color: #C4C4C4; margin: 0 2px; }
    .ordered-for-strip__ser  { font-size: 13px; color: #4B4B4B; }
    .it-pending { font-size: 12px; color: #9E9E9E; font-style: italic; }
    .r          { text-align: right; }
    .it-linetotal { font-size: 13px; font-weight: 700; color: #1A1A1A; }
    .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* SUMMARY */
    .sum-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13px; }
    .sum-row__lbl { color: #717171; }
    .sum-row__val { font-weight: 500; color: #1A1A1A; }
    .sum-row__val--muted { color: #9E9E9E; font-style: italic; font-weight: 400; }
    .sum-divider { height: 1px; background: #DEDEDE; margin: 10px 0; }
    .sum-total { display: flex; justify-content: space-between; align-items: flex-start; padding: 4px 0; }
    .sum-total__lbl { font-size: 14px; font-weight: 700; color: #1A1A1A; padding-top: 4px; }
    .sum-total__val { font-size: 20px; font-weight: 800; color: #005EB8; }
    .sum-total__excl { font-size: 10px; color: #9E9E9E; margin-top: 3px; text-align: right; }
    .sum-pending { text-align: center; padding: 16px 0 8px; }
    .sum-pending__msg { font-size: 13px; color: #717171; line-height: 1.5; margin-top: 10px; }

    /* INFO ROWS */
    .info-row { display: flex; flex-direction: column; gap: 2px; padding: 10px 0; border-bottom: 1px solid #F0F0F0; }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row:first-child { padding-top: 0; }
    .info-lbl { font-size: 11px; font-weight: 700; color: #9E9E9E; text-transform: uppercase; letter-spacing: 0.4px; }
    .info-val { font-size: 13px; color: #1A1A1A; line-height: 1.5; }
    .info-val--link { color: #005EB8; font-weight: 700; text-decoration: none; }
    .info-val--link:hover { text-decoration: underline; }

    /* NOTE FROM OKUMA */
    .okuma-note { border: 1px solid #C7DCFA; border-radius: 4px; overflow: hidden; }
    .okuma-note__head {
      padding: 10px 16px; background: #F0F6FF; border-bottom: 1px solid #C7DCFA;
      font-size: 11px; font-weight: 700; color: #003D82;
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .okuma-note__body { padding: 14px 16px; font-size: 13px; color: #1A1A1A; line-height: 1.6; }

    /* YOUR MESSAGE (customer note) */
    .cust-note { border: 1px solid #DEDEDE; border-radius: 4px; overflow: hidden; }
    .cust-note__head {
      padding: 10px 16px; background: #F5F5F5; border-bottom: 1px solid #DEDEDE;
      font-size: 11px; font-weight: 700; color: #717171;
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .cust-note__body { padding: 14px 16px; font-size: 13px; color: #1A1A1A; line-height: 1.6; white-space: pre-wrap; }

    /* ACTIONS */
    .action-stack { display: flex; flex-direction: column; gap: 10px; }
    .btn-det {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 40px; border-radius: 2px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; border: 1.5px solid transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-det--primary { background: #005EB8; color: #fff; border-color: #005EB8; }
    .btn-det--primary:hover { background: #0B308E; border-color: #0B308E; }
    .btn-det--outline { background: #fff; color: #005EB8; border-color: #005EB8; }
    .btn-det--outline:hover { background: #F0F6FF; }
    .btn-det--danger  { background: #fff; color: #C0392B; border-color: #C0392B; }
    .btn-det--danger:hover { background: #FFF5F5; }
    .btn-det svg { width: 14px; height: 14px; flex-shrink: 0; }
    .support-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 13px; color: #717171; text-decoration: none; padding: 6px 0;
    }
    .support-link:hover { color: #005EB8; }

    /* ── DEALER RESPONSE ITEMS (responded view) ── */
    .resp-items-card { border: 1px solid #DEDEDE; border-radius: 4px; overflow: hidden; }
    .resp-items-head {
      padding: 12px 20px; background: #F5F5F5; border-bottom: 1px solid #DEDEDE;
      font-size: 11px; font-weight: 700; color: #717171; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .resp-item-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0 20px;
      padding: 18px 20px;
      border-bottom: 1px solid #F0F0F0;
      align-items: start;
    }
    .resp-item-row:last-child { border-bottom: none; }
    .resp-part-desc { font-size: 11px; color: #9E9E9E; margin-top: 3px; line-height: 1.4; }
    .resp-part-listprice { font-size: 12px; color: #4B4B4B; margin-top: 6px; font-weight: 500; }
    .resp-nochange-msg { font-size: 12px; color: #4B4B4B; margin-top: 4px; }
    .resp-col-action { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; padding-top: 2px; }
    .resp-part-name { font-size: 13px; font-weight: 700; color: #1A1A1A; }
    .resp-part-pn   { font-size: 11px; color: #9E9E9E; margin-top: 2px; }
    .resp-part-qty  { font-size: 12px; color: #717171; margin-top: 5px; }

    .resp-action-card { border-radius: 4px; padding: 13px 14px; }
    .resp-action-card--none    { background: #F9FFF9; border: 1px solid #B8DCCA; }
    .resp-action-card--price   { background: #FAFFFE; border: 1px solid #B0D8D0; }
    .resp-action-card--partno  { background: #FFFDF4; border: 1px solid #E8D87A; }
    .resp-action-card--invalid { background: #FFF8F8; border: 1px solid #F0BABA; }

    .resp-action-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 5px; margin-bottom: 8px;
    }
    .resp-action-label--none    { color: #1D6B40; }
    .resp-action-label--price   { color: #1D6B40; }
    .resp-action-label--partno  { color: #7A4F00; }
    .resp-action-label--invalid { color: #8B2020; }

    .resp-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .resp-price-old { font-size: 12px; color: #9E9E9E; text-decoration: line-through; }
    .resp-price-new { font-size: 15px; font-weight: 800; color: #005EB8; }
    .resp-price-unit { font-size: 11px; color: #9E9E9E; }

    .resp-partno-new {
      font-size: 13px; font-weight: 700; color: #1A1A1A;
      background: #FFF9EF; border: 1px solid #F0C040;
      border-radius: 3px; padding: 4px 8px; display: inline-block; margin-bottom: 8px;
    }
    .resp-reason {
      font-size: 12px; color: #5A1A1A; line-height: 1.5;
      background: rgba(255,255,255,0.6); border-radius: 3px;
      padding: 7px 9px; margin-bottom: 10px; font-style: italic;
    }

    .resp-btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; border-radius: 3px; padding: 0 14px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer;
      border: 1.5px solid transparent; text-decoration: none; white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .resp-btn--cart    { background: #005EB8; color: #fff; border-color: #005EB8; }
    .resp-btn--cart:hover { background: #0B308E; border-color: #0B308E; }
    .resp-btn--cart:disabled { background: #74AA50; border-color: #74AA50; cursor: default; }
    .resp-btn--contact { background: #fff; color: #005EB8; border-color: #005EB8; }
    .resp-btn--contact:hover { background: #F0F6FF; }

    .resp-added-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; color: #1D6B40;
      background: #EDF7F0; border: 1px solid #B8DCCA;
      border-radius: 3px; padding: 4px 10px;
    }

    /* ── MESSAGING THREAD ── */
    .msg-thread { border: 1px solid #DEDEDE; border-radius: 4px; overflow: hidden; }
    .msg-thread__head {
      padding: 12px 20px; background: #F5F5F5; border-bottom: 1px solid #DEDEDE;
      font-size: 11px; font-weight: 700; color: #717171; text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .msg-thread__body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg-bubble-wrap { display: flex; flex-direction: column; gap: 4px; }
    .msg-bubble-label { font-size: 11px; font-weight: 700; color: #9E9E9E; text-transform: uppercase; letter-spacing: 0.4px; }
    .msg-bubble {
      font-size: 13px; line-height: 1.65; border-radius: 4px;
      padding: 11px 14px; white-space: pre-wrap;
    }
    .msg-bubble--customer { background: #F5F5F5; border-left: 3px solid #DEDEDE; color: #1A1A1A; }
    .msg-bubble--dealer   { background: #F0F6FF; border-left: 3px solid #005EB8; color: #1A1A1A; }

    /* ── RESPONDED SUMMARY ── */
    .sum-excl-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13px; }
    .sum-excl-row__lbl { color: #9E9E9E; font-style: italic; }
    .sum-excl-row__val { color: #C0392B; font-weight: 500; }

    /* TOAST */
    .toast {
      position: fixed; top: 24px; right: 32px;
      transform: translateY(-12px);
      background: #1A1A1A; color: #fff; border-radius: 4px;
      padding: 11px 20px; font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* WITHDRAW MODAL — danger variant only; base csw-* styles injected by components.js */
    .csw-btn--withdraw { background: #C0392B; border: 1px solid #C0392B; color: #fff; }
    .csw-btn--withdraw:hover { background: #A93226; border-color: #A93226; }

    img, svg { max-width: 100%; }

    @media (min-width: 769px) and (max-width: 1199px) {
      .main-area { padding: 24px 24px 48px; }
      .detail-aside { width: 268px; }
    }
    @media (max-width: 900px) {
      .detail-layout { flex-direction: column; }
      .detail-aside { width: 100%; }
    }
    @media (max-width: 768px) {
      .main-area { padding: 16px 16px 48px; }
      .timeline-card { padding: 20px 16px; }
      .page-head__title { font-size: 20px; }
    }
    @media (max-width: 480px) {
      .page-head__title { font-size: 18px; }
      .step-date { display: none; }
    }
  </style>
</head>
<body>

  <div id="okuma-header"></div>

  <div class="app-body-shell">
    <div id="okuma-sidebar" data-active="quotes"></div>

    <main class="main-area">

      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="dashboard.html">Home</a>
        <span class="breadcrumb__sep">/</span>
        <a href="my-quotes.html">My Quotes</a>
        <span class="breadcrumb__sep">/</span>
        <span class="breadcrumb__current" id="bcId">Quote Detail</span>
      </nav>

      <div class="page-head">
        <a href="my-quotes.html" class="page-head__back" aria-label="Back to My Quotes">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="page-head__info">
          <h1 class="page-head__title" id="pgTitle">Quote</h1>
          <span class="page-head__meta" id="pgMeta"></span>
        </div>
        <span id="pgBadge"></span>
      </div>

      <div id="quoteContent"></div>

    </main>
  </div>

  <div id="okuma-auth-footer"></div>
  <div class="toast" id="toast"></div>

  <div class="csw-overlay" id="withdrawModal">
    <div class="csw-modal" role="dialog" aria-modal="true" aria-labelledby="withdrawModalTitle">
      <div class="csw-modal__hdr">
        <h2 class="csw-modal__ttl" id="withdrawModalTitle">Withdraw Quote Request?</h2>
        <button class="csw-modal__cls" onclick="closeWithdrawModal()" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 4l10 10M14 4L4 14"/></svg>
        </button>
      </div>
      <div class="csw-modal__bdy">
        <p id="withdrawModalBody">Are you sure you want to withdraw this quote? This action cannot be undone.</p>
        <div class="csw-modal__div"></div>
        <div class="csw-modal__act">
          <button class="csw-btn csw-btn--cancel" onclick="closeWithdrawModal()">Keep Quote</button>
          <button class="csw-btn csw-btn--withdraw" onclick="confirmWithdraw()">Withdraw Request</button>
        </div>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
  <script src="components.js"></script>

  <script>
  (function () {

    var TODAY = 20260626;

    function daysDiff(expirySort) {
      var ey = Math.floor(expirySort / 10000);
      var em = Math.floor((expirySort % 10000) / 100);
      var ed = expirySort % 100;
      var ty = Math.floor(TODAY / 10000);
      var tm = Math.floor((TODAY % 10000) / 100);
      var td = TODAY % 100;
      return (ey - ty) * 365 + (em - tm) * 30 + (ed - td);
    }

    /* ── DATA ─────────────────────────────────────────────── */
    var DATA = {

    /* ── HELPERS ──────────────────────────────────────────── */
    var STATUS_LABEL = {
      'open':      'Open',
      'responded': 'Responded',
      'closed':    'Closed'
    };
    var BADGE_CLASS = {
      'open':      'status-badge--open',
      'responded': 'status-badge--responded',
      'closed':    'status-badge--closed'
    };

    function fmt(n) {
      return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function badge(s) {
      return '<span class="status-badge ' + (BADGE_CLASS[s] || '') + '"><span class="dot"></span>' + (STATUS_LABEL[s] || s) + '</span>';
    }
    function checkIcon() {
      return '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2 6l3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
    function dotIcon(col) {
      return '<svg width="8" height="8" viewBox="0 0 8 8" fill="' + col + '" aria-hidden="true"><circle cx="4" cy="4" r="4"/></svg>';
    }
    function warnSvg(col) {
      return '<svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><circle cx="7.5" cy="7.5" r="6.5" stroke="' + col + '" stroke-width="1.4"/><path d="M7.5 4.5v3.5" stroke="' + col + '" stroke-width="1.5" stroke-linecap="round"/><circle cx="7.5" cy="10.5" r="0.75" fill="' + col + '"/></svg>';
    }

    /* ── LOCALSTORAGE HELPERS ─────────────────────────────── */
    function lsGet(key) {
      try { var v = sessionStorage.getItem(key); return v ? JSON.parse(v) : null; } catch (e) { return null; }
    }
    function lsSet(key, val) {
      try { sessionStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function lsRaw(key) {
      try { return sessionStorage.getItem(key); } catch (e) { return null; }
    }

    /* ── CART HELPERS ─────────────────────────────────────── */
    function cartKey(quoteId) { return 'okuma_cart_' + quoteId; }

    function getCartState(quoteId) {
      return lsGet(cartKey(quoteId)) || {};
    }

    function addToCart(q, dealerResp, idx) {
      var itm   = q.items[idx];
      var dr    = dealerResp.items[idx];
      var price = dr.action === 'price' ? parseFloat(dr.priceVal) : itm.listPrice || dr.listPrice;
      var cart  = getCartState(q.num);
      cart[idx] = { name: itm.name, pn: itm.pn, qty: dr.qty || itm.qty, unit: price };
      lsSet(cartKey(q.num), cart);

      /* push to global cart list for cart.html */
      var globalCart = lsGet('okuma_global_cart') || [];
      globalCart = globalCart.filter(function(c) { return !(c.quoteId === q.num && c.idx === idx); });
      globalCart.push({ quoteId: q.num, idx: idx, name: itm.name, pn: itm.pn, qty: dr.qty || itm.qty, unit: price });
      lsSet('okuma_global_cart', globalCart);

      showToast(itm.name + ' added to cart');
      refreshCartButtons(q, dealerResp);
      checkAllCarted(q, dealerResp);
    }

    function refreshCartButtons(q, dealerResp) {
      var cart = getCartState(q.num);
      dealerResp.items.forEach(function(dr, idx) {
        if (dr.action !== 'none' && dr.action !== 'price') return;
        var btn = document.getElementById('cart-btn-' + idx);
        var tag = document.getElementById('cart-tag-' + idx);
        if (!btn && !tag) return;
        if (cart[idx]) {
          if (btn) btn.style.display = 'none';
          if (tag) tag.style.display = 'inline-flex';
        }
      });
    }

    function checkAllCarted(q, dealerResp) {
      var cart       = getCartState(q.num);
      var cartable   = dealerResp.items.filter(function(dr) { return dr.action === 'none' || dr.action === 'price'; });
      var cartedCount = cartable.filter(function(_, i) {
        var realIdx = dealerResp.items.indexOf(cartable[i]);
        return cart[realIdx] !== undefined;
      }).length;

      /* count using actual indices */
      var allCarted = cartable.length > 0 && cartable.every(function(dr, ci) {
        var realIdx = dealerResp.items.indexOf(dr);
        return cart[realIdx] !== undefined;
      });

      if (allCarted) {
        try {
          sessionStorage.setItem('okuma_quote_status_' + q.num, 'closed');
        } catch(e) {}
        showToast('All items added to cart — quote is now Closed');
        setTimeout(function() {
          var badge = document.getElementById('pgBadge');
          if (badge) badge.innerHTML = '<span class="status-badge status-badge--closed"><span class="dot"></span>Closed</span>';
          var actAside = document.getElementById('asideActions');
          if (actAside) {
            var icoCart = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="5.5" cy="11.5" r="1"/><circle cx="10.5" cy="11.5" r="1"/><path d="M1 1h2l1.5 7h6l1.5-6H4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
            actAside.innerHTML =
              '<a href="cart.html" class="btn-det btn-det--primary">' + icoCart + 'View Cart</a>' +
              '<a href="#" class="support-link" onclick="return false;">' +
                '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M6.5 6v2M6.5 4a1 1 0 1 1 0 2.01"/></svg>' +
                'Contact Support' +
              '</a>';
          }
        }, 1600);
      }
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2200);
    }

    /* ── RENDER ───────────────────────────────────────────── */
    function render(q) {
      document.title = q.num + ' — Okuma Parts Portal';
      document.getElementById('bcId').textContent = q.num;
      document.getElementById('pgTitle').textContent = q.num;
      document.getElementById('pgMeta').textContent = 'Submitted ' + q.submitted;

      /* check sessionStorage status override */
      var lsStatus = lsRaw('okuma_quote_status_' + q.num);
      /* For open quotes, always keep customer view as Open regardless of dealer sessionStorage */
      var effectiveStatus = (q.status === 'open') ? 'open' : (lsStatus || q.status);
      document.getElementById('pgBadge').innerHTML = badge(effectiveStatus);

      /* check for dealer response data — fall back to embedded static data */
      var dealerResp = lsGet('okuma_dealer_response_' + q.num) || q.dealerResponse || null;
      var isResponded = (effectiveStatus === 'responded' || effectiveStatus === 'closed') && dealerResp;

      /* patch q.steps for timeline if status overridden */
      var stepsForTimeline = q.steps;
      if (lsStatus === 'responded' && q.status !== 'open') {
        stepsForTimeline = [
          { label: 'Open',      date: q.submitted,         s: 'done'   },
          { label: 'Responded', date: dealerResp ? dealerResp.submittedAt : 'Jul 03, 2026', s: 'active' },
          { label: 'Closed',    date: '—',                 s: 'pending'}
        ];
      }
      if (lsStatus === 'closed' && q.status === 'responded') {
        stepsForTimeline = [
          { label: 'Open',      date: q.submitted,         s: 'done' },
          { label: 'Responded', date: dealerResp ? dealerResp.submittedAt : '—', s: 'done' },
          { label: 'Closed',    date: 'Jul 03, 2026',      s: 'done' }
        ];
      }

      var html = renderBanner(q, effectiveStatus) + renderTimelineSteps(stepsForTimeline);
      html += renderQuoteInfoStrip(q);
      html += '<div class="detail-layout">';

      if (isResponded) {
        html += '<div class="detail-main">' +
          renderRespondedItems(q, dealerResp, effectiveStatus) +
          renderMsgThread(q, dealerResp) +
          '</div>';
        html += '<div class="detail-aside">' +
          renderRespondedSummary(q, dealerResp) +
          '<div id="asideActions">' + renderActions(q, effectiveStatus) + '</div>' +
          '</div>';
      } else {
        html += '<div class="detail-main">' + renderItems(q) + renderCustomerNote(q) + '</div>';
        html += '<div class="detail-aside">' + renderSummary(q) + renderNote(q) +
          '<div id="asideActions">' + renderActions(q, effectiveStatus) + '</div>' + '</div>';
      }

      html += '</div>';
      document.getElementById('quoteContent').innerHTML = html;

      if (isResponded) {
        refreshCartButtons(q, dealerResp);
      }
    }

    function renderBanner(q, effectiveStatus) {
      var s = effectiveStatus || q.status;
      var cr = q.closeReason;
      if (s === 'closed' && cr === 'expired') {
        return '<div class="alert-banner alert-banner--grey">' + warnSvg('#9E9E9E') +
          '<span>This quote expired on <strong>' + q.expiry + '</strong> without being approved. Request a new quote to proceed.</span>' +
          '</div>';
      }
      if (s === 'closed' && cr === 'declined') {
        return '<div class="alert-banner alert-banner--urgent">' + warnSvg('#C0392B') +
          '<span>This quote request was declined. Contact your Okuma representative if you believe this is in error or to discuss alternatives.</span>' +
          '</div>';
      }
      if (s === 'closed' && !cr && q.status !== 'closed') {
        return '<div class="alert-banner alert-banner--grey">' + warnSvg('#9E9E9E') +
          '<span>All items from this quote have been added to your cart. This quote is now <strong>Closed</strong>.</span>' +
          '</div>';
      }
      if (s === 'responded' && q.expirySort > 0) {
        var days = daysDiff(q.expirySort);
        if (days <= 6) {
          var dStr = days <= 0 ? 'today' : (days === 1 ? 'tomorrow' : 'in ' + days + ' days');
          return '<div class="alert-banner alert-banner--urgent">' + warnSvg('#C0392B') +
            '<span>This quote expires <strong>' + dStr + '</strong> (' + q.expiry + '). Approve it now to secure your pricing.</span>' +
            '</div>';
        }
        if (days <= 14) {
          return '<div class="alert-banner alert-banner--warn">' + warnSvg('#E08A00') +
            '<span>This quote expires in <strong>' + days + ' days</strong> (' + q.expiry + '). Approve before the deadline to secure pricing.</span>' +
            '</div>';
        }
      }
      return '';
    }

    function renderTimelineSteps(steps) {
      var activeIdx = 0;
      for (var i = 0; i < steps.length; i++) {
        if (steps[i].s === 'done' || steps[i].s === 'active') activeIdx = i;
      }
      var pct = (activeIdx / (steps.length - 1)) * 100;

      var stepsHTML = steps.map(function(st) {
        var dc = 'step-dot', lc = 'step-label', dtc = 'step-date', inner = '';
        if (st.s === 'done') {
          dc += ' step-dot--done'; lc += ' step-label--done'; dtc += ' step-date--done';
          inner = checkIcon();
        } else if (st.s === 'active') {
          dc += ' step-dot--active'; lc += ' step-label--active'; dtc += ' step-date--active';
          inner = dotIcon('#fff');
        } else {
          dc += ' step-dot--pending';
          inner = dotIcon('#DEDEDE');
        }
        return '<div class="timeline-step">' +
          '<div class="' + dc + '">' + inner + '</div>' +
          '<span class="' + lc + '">' + st.label + '</span>' +
          '<span class="' + dtc + '">' + st.date + '</span>' +
          '</div>';
      }).join('');

      return '<div class="timeline-card">' +
        '<div class="timeline">' +
        '<div class="timeline-track"><div class="timeline-track__fill" style="width:' + pct + '%"></div></div>' +
        stepsHTML +
        '</div></div>';
    }

    /* ── RESPONDED ITEMS CARD ─────────────────────────────── */
    function renderRespondedItems(q, dealerResp, effectiveStatus) {
      var isClosed = (effectiveStatus === 'closed');
      var cartSvg  = '<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="5.5" cy="11.5" r="1"/><circle cx="10.5" cy="11.5" r="1"/><path d="M1 1h2l1.5 7h6l1.5-6H4"/></svg>';
      var phoneSvg = '<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 1h3l1.5 3.5-2 1.2a8 8 0 0 0 3.8 3.8l1.2-2L13 9v3a1 1 0 0 1-1 1A11 11 0 0 1 1 2a1 1 0 0 1 1-1z"/></svg>';
      var chkSvg   = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 6l3 3 5-6"/></svg>';

      var rows = q.items.map(function(itm, idx) {
        var dr        = dealerResp.items[idx] || { action: 'none' };
        var listPrice = itm.listPrice || dr.listPrice || 0;
        var qty       = itm.qty || dr.qty || 1;

        /* ── Col 1: Part info ── */
        var col1 =
          '<div class="resp-part-name">' + escHtml(itm.name) + '</div>' +
          '<div class="resp-part-pn">P/N: ' + escHtml(itm.pn) + '</div>' +
          (itm.desc ? '<div class="resp-part-desc">' + escHtml(itm.desc) + '</div>' : '') +
          '<div class="resp-part-qty">Qty: ' + qty + '</div>' +
          (listPrice ? '<div class="resp-part-listprice">List price: ' + fmt(listPrice) + ' / ea</div>' : '');

        /* ── Col 2: Response scenario card ── */
        var col2 = '';
        /* ── Col 3: Action button ── */
        var col3 = '';

        var addCartBtns = isClosed
          ? '<button class="resp-btn resp-btn--cart" disabled style="opacity:0.35;cursor:not-allowed;" aria-disabled="true">' + cartSvg + ' Add to Cart</button>'
          : '<button id="cart-btn-' + idx + '" class="resp-btn resp-btn--cart" onclick="qAddToCart(' + idx + ')">' + cartSvg + ' Add to Cart</button>' +
            '<span id="cart-tag-' + idx + '" class="resp-added-tag" style="display:none">' + chkSvg + ' Added to Cart</span>';
        var contactBtn = isClosed
          ? '<span class="resp-btn resp-btn--contact" style="opacity:0.4;cursor:not-allowed;" aria-disabled="true">' + phoneSvg + ' Contact Distributor</span>'
          : '<a href="https://www.okuma.com/distributors" target="_blank" rel="noopener" class="resp-btn resp-btn--contact">' + phoneSvg + ' Contact Distributor</a>';

        if (dr.action === 'none') {
          col2 = '<div class="resp-action-card resp-action-card--none">' +
            '<div class="resp-action-label resp-action-label--none">' + chkSvg + ' No Change</div>' +
            '<p class="resp-nochange-msg">Confirmed at list price</p>' +
            '</div>';
          col3 = addCartBtns;

        } else if (dr.action === 'price') {
          var newPrice = parseFloat(dr.priceVal) || listPrice;
          col2 = '<div class="resp-action-card resp-action-card--price">' +
            '<div class="resp-action-label resp-action-label--price">' + chkSvg + ' Price Corrected</div>' +
            '<div class="resp-price-row">' +
              '<span class="resp-price-old">' + fmt(listPrice) + '</span>' +
              '<span class="resp-price-new">' + fmt(newPrice) + '</span>' +
              '<span class="resp-price-unit">/ ea</span>' +
            '</div>' +
            '<div style="font-size:11px;color:#717171;margin-top:2px;">Total: ' + fmt(qty * newPrice) + '</div>' +
            '</div>';
          col3 = addCartBtns;

        } else if (dr.action === 'partno') {
          col2 = '<div class="resp-action-card resp-action-card--partno">' +
            '<div class="resp-action-label resp-action-label--partno">' +
              '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 1v5M6 9v2M1 6h2M9 6h2"/></svg>' +
              ' Part Corrected</div>' +
            '<div style="margin-bottom:4px;font-size:12px;color:#717171;">Corrected Part No.</div>' +
            '<div class="resp-partno-new">' + escHtml(dr.partnVal || '—') + '</div>' +
            '</div>';
          col3 = contactBtn;

        } else if (dr.action === 'invalid') {
          col2 = '<div class="resp-action-card resp-action-card--invalid">' +
            '<div class="resp-action-label resp-action-label--invalid">' +
              '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M2 2l8 8M10 2L2 10"/></svg>' +
              ' Part Invalid</div>' +
            '<div class="resp-reason">&ldquo;' + escHtml(dr.reasonVal || 'No reason provided.') + '&rdquo;</div>' +
            '</div>';
          col3 = contactBtn;
        }

        return '<div class="resp-item-row">' +
          '<div>' + col1 + '</div>' +
          '<div>' + col2 + '</div>' +
          '<div class="resp-col-action">' + col3 + '</div>' +
          '</div>';
      }).join('');

      return '<div class="resp-items-card">' +
        '<div class="resp-items-head">Dealer\'s Response — ' + q.items.length + ' Line Item' + (q.items.length !== 1 ? 's' : '') + '</div>' +
        rows +
        '</div>';
    }

    /* ── MESSAGING THREAD ─────────────────────────────────── */
    function renderMsgThread(q, dealerResp) {
      var hasCustomer = !!q.customerNote;
      var hasDealer   = dealerResp && dealerResp.replyText && dealerResp.replyText.trim();
      if (!hasCustomer && !hasDealer) return '';

      var msgSvg = '<svg width="11" height="11" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 1.5H2A1.5 1.5 0 0 0 .5 3v5A1.5 1.5 0 0 0 2 9.5h1.5L5 11.5l1.5-2H11a1.5 1.5 0 0 0 1.5-1.5V3A1.5 1.5 0 0 0 11 1.5z"/></svg>';

      var html = '<div class="msg-thread">' +
        '<div class="msg-thread__head">' + msgSvg + ' Messages</div>' +
        '<div class="msg-thread__body">';

      if (hasCustomer) {
        html += '<div class="msg-bubble-wrap">' +
          '<span class="msg-bubble-label">Your Message</span>' +
          '<div class="msg-bubble msg-bubble--customer">' + escHtml(q.customerNote) + '</div>' +
          '</div>';
      }
      if (hasDealer) {
        html += '<div class="msg-bubble-wrap">' +
          '<span class="msg-bubble-label">Dealer\'s Reply</span>' +
          '<div class="msg-bubble msg-bubble--dealer">' + escHtml(dealerResp.replyText) + '</div>' +
          '</div>';
      }

      html += '</div></div>';
      return html;
    }

    /* ── RESPONDED SUMMARY ────────────────────────────────── */
    function renderRespondedSummary(q, dealerResp) {
      var html = '<div class="det-card"><div class="det-card__head">Quote Summary</div><div class="det-card__body">';

      var subtotal = 0, excluded = 0;
      dealerResp.items.forEach(function(dr, idx) {
        var itm  = q.items[idx] || {};
        var qty  = itm.qty || dr.qty || 1;
        var list = itm.listPrice || dr.listPrice || 0;
        if (dr.action === 'none')  { subtotal += qty * list; }
        else if (dr.action === 'price') { subtotal += qty * (parseFloat(dr.priceVal) || list); }
        else { excluded++; }
      });

      var pricedN = dealerResp.items.length - excluded;
      if (pricedN > 0) {
        html += '<div class="sum-row"><span class="sum-row__lbl">Subtotal (' + pricedN + ' item' + (pricedN !== 1 ? 's' : '') + ')</span><span class="sum-row__val">' + fmt(subtotal) + '</span></div>';
      }
      if (excluded > 0) {
        html += '<div class="sum-row"><span class="sum-row__lbl">Not available (' + excluded + ')</span><span class="sum-row__val" style="color:#C0392B">—</span></div>';
      }
      html += '<div class="sum-row"><span class="sum-row__lbl">Shipping &amp; Handling</span><span class="sum-row__val sum-row__val--muted">Added at shipment</span></div>';
      html += '<div class="sum-row"><span class="sum-row__lbl">Tax</span><span class="sum-row__val sum-row__val--muted">Calculated at checkout</span></div>';
      html += '<div class="sum-divider"></div>';
      html += '<div class="sum-total">' +
        '<span class="sum-total__lbl">Total</span>' +
        '<div style="text-align:right">' +
        '<div class="sum-total__val">' + fmt(subtotal) + '</div>' +
        '<div class="sum-total__excl">excl. shipping &amp; tax</div>' +
        '</div></div>';

      html += '</div></div>';
      return html;
    }

    function renderItems(q) {
      var first = q.items[0];
      var strip = first
        ? '<div style="margin-bottom:12px;">' +
            '<p class="ordered-for-label">Ordered For</p>' +
            '<div class="ordered-for-strip">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#005EB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>' +
              '<span class="ordered-for-strip__mach">' + first.mach + '</span>' +
              '<span class="ordered-for-strip__sep">|</span>' +
              '<span class="ordered-for-strip__ser">Serial No: ' + first.ser + '</span>' +
            '</div>' +
          '</div>'
        : '';

      var rows = q.items.map(function(it) {
        var unitCell = it.unit !== null
          ? '<span style="color:#4B4B4B">' + fmt(it.unit) + '</span>'
          : '<span class="it-pending">TBD</span>';
        var lineCell = it.unit !== null
          ? '<span class="it-linetotal">' + fmt(it.qty * it.unit) + '</span>'
          : '<span class="it-pending">—</span>';
        return '<tr>' +
          '<td><div class="it-name">' + it.name + '</div><div class="it-pn">P/N: ' + it.pn + '</div></td>' +
          '<td class="r" style="width:50px">' + it.qty + '</td>' +
          '<td class="r" style="width:105px">' + unitCell + '</td>' +
          '<td class="r" style="width:105px">' + lineCell + '</td>' +
          '</tr>';
      }).join('');

      return strip +
        '<div class="det-card">' +
        '<div class="det-card__head">Items in Quote (' + q.items.length + ')</div>' +
        '<div class="tbl-scroll">' +
        '<table class="items-tbl">' +
        '<thead><tr>' +
        '<th>Part</th>' +
        '<th class="r" style="width:50px">Qty</th>' +
        '<th class="r" style="width:105px">Unit Price</th>' +
        '<th class="r" style="width:105px">Line Total</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '</div></div>';
    }

    function renderSummary(q) {
      var html = '<div class="det-card"><div class="det-card__head">Quote Summary</div><div class="det-card__body">';
      if (q.sum === null) {
        html += '<div class="sum-pending">' +
          '<svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true"><circle cx="14" cy="14" r="11" stroke="#DEDEDE" stroke-width="1.5"/><path d="M14 9v5.5l3.5 2" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '<p class="sum-pending__msg">Pricing will appear here once your quote has been reviewed by our team.</p>' +
          '</div>';
      } else {
        var s = q.sum;
        var n = q.items.length;
        html += '<div class="sum-row"><span class="sum-row__lbl">Subtotal (' + n + ' item' + (n !== 1 ? 's' : '') + ')</span><span class="sum-row__val">' + fmt(s.subtotal) + '</span></div>';
        html += '<div class="sum-row"><span class="sum-row__lbl">Shipping &amp; Handling</span><span class="sum-row__val sum-row__val--muted">Added at shipment</span></div>';
        html += '<div class="sum-row"><span class="sum-row__lbl">Tax</span><span class="sum-row__val sum-row__val--muted">Calculated at checkout</span></div>';
        html += '<div class="sum-divider"></div>';
        html += '<div class="sum-total">' +
          '<span class="sum-total__lbl">Total</span>' +
          '<div style="text-align:right">' +
          '<div class="sum-total__val">' + fmt(s.total) + '</div>' +
          '<div class="sum-total__excl">excl. shipping &amp; tax</div>' +
          '</div>' +
          '</div>';
      }
      html += '</div></div>';
      return html;
    }

    function renderQuoteInfoStrip(q) {
      return '<div class="quote-info-strip">' +
        '<div class="quote-info-strip__field"><span class="quote-info-strip__lbl">Quote No</span><span class="quote-info-strip__val quote-info-strip__val--blue">' + q.num + '</span></div>' +
        '<div class="quote-info-strip__field"><span class="quote-info-strip__lbl">Submitted</span><span class="quote-info-strip__val">' + q.submitted + '</span></div>' +
        '<div class="quote-info-strip__field"><span class="quote-info-strip__lbl">Customer</span><span class="quote-info-strip__val">' + q.requestedBy + '</span></div>' +
        '<div class="quote-info-strip__field"><span class="quote-info-strip__lbl">Company</span><span class="quote-info-strip__val">' + (q.company || '—') + '</span></div>' +
        '</div>';
    }

    function renderNote(q) {
      if (!q.note) return '';
      var isOrder = q.closeReason === 'ordered';
      var infoSvg = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#003D82" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M6.5 6v2.5M6.5 4a.5.5 0 1 1 0 1.01"/></svg>';
      return '<div class="okuma-note">' +
        '<div class="okuma-note__head">' + infoSvg + (isOrder ? 'Order Confirmation' : 'Note from Okuma') + '</div>' +
        '<div class="okuma-note__body">' + q.note + '</div>' +
        '</div>';
    }

    function renderCustomerNote(q) {
      if (!q.customerNote) return '';
      var msgSvg = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#717171" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 1.5H2A1.5 1.5 0 0 0 .5 3v5A1.5 1.5 0 0 0 2 9.5h1.5L5 11.5l1.5-2H11a1.5 1.5 0 0 0 1.5-1.5V3A1.5 1.5 0 0 0 11 1.5z"/></svg>';
      return '<div class="cust-note">' +
        '<div class="cust-note__head">' + msgSvg + 'Your Message</div>' +
        '<div class="cust-note__body">' + q.customerNote + '</div>' +
        '</div>';
    }

    function renderActions(q, effectiveStatus) {
      var s = effectiveStatus || q.status;
      var html = '<div class="action-stack">';

      var icoCart = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="5.5" cy="11.5" r="1"/><circle cx="10.5" cy="11.5" r="1"/><path d="M1 1h2l1.5 7h6l1.5-6H4"/></svg>';
      var icoWithdraw = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';
      var icoNew = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
      var icoArrow = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1 7h9M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      var icoDl = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v8M4 7l3 3.5L10 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 11v1A1.5 1.5 0 0 0 2.5 13.5h9A1.5 1.5 0 0 0 13 12v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';

      if (s === 'responded') {
        html += '<a href="cart.html" class="btn-det btn-det--primary">' + icoCart + 'View Cart</a>';
        html += '<button class="btn-det btn-det--danger" onclick="openWithdrawModal()">' + icoWithdraw + 'Withdraw Quote Request</button>';
      } else if (s === 'open') {
        html += '<span class="btn-det btn-det--primary" style="opacity:0.35;cursor:not-allowed;" aria-disabled="true">' + icoCart + 'View Cart</span>';
        html += '<button class="btn-det btn-det--danger" onclick="openWithdrawModal()">' + icoWithdraw + 'Withdraw Quote Request</button>';
      } else if (s === 'closed' && q.closeReason === 'ordered') {
        html += '<a href="order-detail.html?id=' + q.linkedOrderId + '" class="btn-det btn-det--primary">' + icoArrow + 'View Order</a>';
        html += '<a href="#" class="btn-det btn-det--outline" onclick="return false;">' + icoDl + 'Download Quote (PDF)</a>';
      } else if (s === 'closed') {
        html += '<span class="btn-det btn-det--primary" style="opacity:0.35;cursor:not-allowed;" aria-disabled="true">' + icoCart + 'View Cart</span>';
        html += '<a href="my-quotes.html" class="btn-det btn-det--outline">' + icoNew + 'Request New Quote</a>';
      }

      html += '<a href="#" class="support-link" onclick="return false;">' +
        '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M6.5 6v2M6.5 4a1 1 0 1 1 0 2.01"/></svg>' +
        'Contact Support' +
        '</a>';

      html += '</div>';
      return html;
    }

    /* ── ESCAPING ─────────────────────────────────────────── */
    function escHtml(s) {
      return String(s)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;');
    }

    /* ── INIT ──────────────────────────────────────────────── */
    var _qRef  = null;
    var _drRef = null;

    /* exposed globally so inline onclick="qAddToCart(idx)" works */
    window.qAddToCart = function(idx) {
      if (_qRef && _drRef) addToCart(_qRef, _drRef, idx);
    };

    var id    = new URLSearchParams(window.location.search).get('id');
    var quote = id && DATA[id];
    _qRef  = quote || DATA['QUO-2026-00089'];
    _drRef = lsGet('okuma_dealer_response_' + _qRef.num);
    render(_qRef);

    /* ── WITHDRAW MODAL ── */
    window.openWithdrawModal = function() {
      var body = document.getElementById('withdrawModalBody');
      if (body && _qRef) {
        body.innerHTML = 'Are you sure you want to withdraw <strong>' + _qRef.num + '</strong>? This action cannot be undone.';
      }
      document.getElementById('withdrawModal').classList.add('open');
    };
    window.closeWithdrawModal = function() {
      document.getElementById('withdrawModal').classList.remove('open');
    };
    window.confirmWithdraw = function() {
      closeWithdrawModal();
      showToast('Quote request withdrawn');
    };
    document.getElementById('withdrawModal').addEventListener('click', function(e) {
      if (e.target === this) closeWithdrawModal();
    });

  })();
  </script>

</body>
</html>
