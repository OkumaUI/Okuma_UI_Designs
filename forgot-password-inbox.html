<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Your Inbox – Okuma Parts Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #F5F5F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #2C2A29;
    }

    /* ─── CONTENT AREA ────────────────────────────────────────── */
    .auth-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 0 120px;
    }

    /* ─── CARD ────────────────────────────────────────────────── */
    .auth-card {
      width: 100%;
      max-width: 480px;
      padding: 48px;
      background: #FFFFFF;
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.08);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
    }

    /* ─── BACK LINK ───────────────────────────────────────────── */
    .back-link {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: #005EB8;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    .back-link__icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: block;
    }

    /* ─── ENVELOPE CIRCLE ─────────────────────────────────────── */
    .inbox-icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #F0F6FF;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin: 0 auto;
    }

    /* ─── HEADING ROW ─────────────────────────────────────────── */
    .inbox-heading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .inbox-heading__icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: block;
    }

    .inbox-heading__text {
      font-size: 22px;
      font-weight: 700;
      color: #2C2A29;
      line-height: 1.5;
    }

    /* ─── BODY TEXT ───────────────────────────────────────────── */
    .inbox-body {
      margin-top: 12px;
      text-align: center;
    }

    .inbox-body__line {
      font-size: 14px;
      font-weight: 400;
      color: #6E6E6E;
      line-height: 1.7;
    }

    .inbox-body__email {
      font-weight: 700;
      color: #2C2A29;
    }

    /* ─── RESEND LINK ─────────────────────────────────────────── */
    .resend-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
    }

    .resend-link {
      font-size: 14px;
      font-weight: 500;
      color: #005EB8;
      text-decoration: none;
      cursor: pointer;
      line-height: 1.5;
    }

    .resend-link:hover { text-decoration: underline; }

    .resend-sent {
      font-size: 13px;
      font-weight: 500;
      color: #74AA50;
      display: none;
      align-items: center;
      gap: 4px;
    }

    .resend-sent--visible { display: inline-flex; }

    img, svg { max-width: 100%; }

    /* ─── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .auth-content { padding: 24px 0 64px; }
      .auth-card { padding: 32px 24px; }
    }

    @media (max-width: 480px) {
      .auth-content { padding: 16px 0 40px; }
      .auth-card { padding: 24px 16px; }
      .inbox-heading__text { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ────────────────────────────────────────────────── -->
  <div id="okuma-auth-header"></div>

  <!-- ─── CONTENT ───────────────────────────────────────────────── -->
  <main class="auth-content">
    <div class="auth-card">

      <!-- Back link (simple left arrow) -->
      <a href="login.html" class="back-link">
        <svg class="back-link__icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 7H2M2 7L6 3M2 7L6 11" stroke="#005EB8" stroke-width="1.17" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Login
      </a>

      <!-- Envelope icon circle -->
      <div class="inbox-icon-circle">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2.5" y="5.5" width="23" height="17" rx="2" stroke="#005EB8" stroke-width="2.33" stroke-linejoin="round"/>
          <path d="M3 7L14 15L25 7" stroke="#005EB8" stroke-width="2.33" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- Heading with green check-circle -->
      <div class="inbox-heading">
        <svg class="inbox-heading__icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M18 9.2V10A8 8 0 1 1 13.3 2.7" stroke="#74AA50" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 9.5L10 12.5L18 4" stroke="#74AA50" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1 class="inbox-heading__text">Check your inbox</h1>
      </div>

      <!-- Body text -->
      <div class="inbox-body">
        <p class="inbox-body__line">
          A reset link has been sent to <span class="inbox-body__email">name@company.com</span>.
        </p>
        <p class="inbox-body__line">
          Check your inbox and follow the instructions.
        </p>
      </div>

      <!-- Resend link + sent feedback -->
      <div class="resend-row">
        <a href="#" class="resend-link" id="resend-btn" onclick="handleResend(event)">Resend email</a>
        <span class="resend-sent" id="resend-sent">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="7" cy="7" r="6.25" stroke="#74AA50" stroke-width="1.5"/>
            <path d="M4.5 7.25L6.25 9L9.5 5.5" stroke="#74AA50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Sent!
        </span>
      </div>

    </div>
  </main>

  <!-- ─── FOOTER ────────────────────────────────────────────────── -->
  <div id="okuma-auth-footer"></div>

  <script>
    function handleResend(event) {
      event.preventDefault();
      var btn = document.getElementById('resend-btn');
      var sent = document.getElementById('resend-sent');

      btn.style.display = 'none';
      sent.classList.add('resend-sent--visible');

      setTimeout(function () {
        sent.classList.remove('resend-sent--visible');
        btn.style.display = '';
      }, 3000);
    }
  </script>

  <script src="components.js"></script>
</body>
</html>
