<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders -“ Okuma Parts Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #FFFFFF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .main-area {
      flex: 1;
      min-width: 0;
      padding: 32px 32px 64px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* â”€â”€ BREADCRUMB â”€â”€ */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #717171;
      margin-bottom: 20px;
    }
    .breadcrumb a { color: #717171; text-decoration: none; }
    .breadcrumb a:hover { color: #005EB8; text-decoration: underline; }
    .breadcrumb__sep { color: #C4C4C4; }
    .breadcrumb__current { color: #1A1A1A; }

    /* â”€â”€ PAGE HEADER â”€â”€ */
    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .page-head__title {
      font-size: 32px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1;
    }
    .btn-stock-order {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #005EB8;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-stock-order:hover { background: #0B308E; }
    .btn-stock-order svg { width: 16px; height: 16px; }

    /* â”€â”€ TOOLBAR â”€â”€ */
    .orders-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap__icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9E9E9E;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 42px;
      border: 1px solid #DEDEDE;
      border-radius: 4px;
      padding: 0 16px 0 42px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1A1A1A;
      background: #fff;
    }
    .search-input::placeholder { color: #9E9E9E; }
    .search-input:focus { outline: none; border-color: #005EB8; }

    .filter-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .filter-select {
      height: 42px;
      border: 1px solid #DEDEDE;
      border-radius: 4px;
      padding: 0 36px 0 14px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #1A1A1A;
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      min-width: 160px;
    }
    .filter-select:focus { outline: none; border-color: #005EB8; }
    .filter-wrap__chevron {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #717171;
    }

    .clear-filter-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: -12px;
      margin-bottom: 16px;
    }
    .clear-filter-bar.visible { display: flex; }
    .clear-filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid #DEDEDE;
      border-radius: 20px;
      padding: 4px 12px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #4B4B4B;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .clear-filter-btn:hover { border-color: #005EB8; color: #005EB8; background: #F0F6FF; }
    .clear-filter-btn svg { flex-shrink: 0; }

    /* â”€â”€ TABLE WRAPPER â”€â”€ */
    .orders-card {
      border: 1px solid #DEDEDE;
      border-radius: 4px;
      overflow: hidden;
    }
    .orders-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 600px;
    }
    .orders-table thead tr { background: #F5F5F5; }
    .orders-table th {
      font-size: 11px;
      font-weight: 700;
      color: #717171;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: left;
      padding: 13px 20px;
      border-bottom: 1px solid #DEDEDE;
      white-space: nowrap;
    }
    .orders-table td {
      padding: 16px 20px;
      border-bottom: 1px solid #DEDEDE;
      vertical-align: middle;
      font-size: 13px;
      color: #1A1A1A;
    }
    .orders-table tbody tr:last-child td { border-bottom: none; }
    .orders-table tbody tr { cursor: pointer; }
    .orders-table tbody tr:hover { background: #F0F6FF; }

    .col-order   { width: 28%; }
    .col-date    { width: 18%; }
    .col-items   { width: 14%; }
    .col-total   { width: 18%; }
    .col-status  { width: 22%; }

    .ordered-for-self {
      color: #9E9E9E;
      font-style: italic;
    }
    .ordered-for-customer {
      color: #1A1A1A;
      font-weight: 500;
    }

    .order-num-label {
      font-size: 13px;
      font-weight: 700;
      color: #005EB8;
    }

    .col-total-val { font-weight: 700; }

    /* â”€â”€ STATUS BADGES â”€â”€ */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 2px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-badge--processing { background: #FFF9EF; border: 0.5px solid #FFB549; color: #FFB549; }
    .status-badge--processing .dot { background: #FFB549; }
    .status-badge--shipped    { background: #F0FCFD; border: 0.5px solid #68D2DF; color: #68D2DF; }
    .status-badge--shipped .dot { background: #68D2DF; }
    .status-badge--delivered  { background: #F4F9F1; border: 0.5px solid #74AA50; color: #74AA50; }
    .status-badge--delivered .dot { background: #74AA50; }
    .status-badge--cancelled  { background: #F5F5F5; border: 0.5px solid #9E9E9E; color: #9E9E9E; }
    .status-badge--cancelled .dot { background: #9E9E9E; }

    /* â”€â”€ TABLE FOOTER â”€â”€ */
    .orders-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid #DEDEDE;
      background: #fff;
    }
    .orders-count {
      font-size: 13px;
      color: #717171;
    }

    /* â”€â”€ PAGINATION â”€â”€ */
    .pagination {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .page-btn {
      min-width: 32px;
      height: 32px;
      border: 1px solid #DEDEDE;
      border-radius: 2px;
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #1A1A1A;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .page-btn:hover:not(:disabled):not(.page-btn--active) {
      border-color: #005EB8;
      color: #005EB8;
    }
    .page-btn--active {
      background: #005EB8;
      border-color: #005EB8;
      color: #fff;
      font-weight: 700;
      cursor: default;
    }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* â”€â”€ EMPTY STATE â”€â”€ */
    .empty-state {
      padding: 64px 20px;
      text-align: center;
      color: #717171;
      font-size: 14px;
    }

    img, svg { max-width: 100%; }

    /* â”€â”€ Tablet landscape: reduce main-area bottom padding â”€â”€ */
    @media (min-width: 769px) and (max-width: 1199px) {
      .main-area { padding: 24px 24px 48px; }
    }

    @media (max-width: 768px) {
      .main-area { padding: 16px 16px 48px; }
      .orders-toolbar { flex-wrap: wrap; }
      .filter-wrap { flex: 1; }
      .filter-select { width: 100%; min-width: 0; }
      /* Allow footer count + pagination to wrap when page buttons grow */
      .orders-foot { flex-wrap: wrap; gap: 12px; }
      /* Tighten table text at tablet widths */
      .orders-table th { font-size: 10px; padding: 10px 14px; }
      .orders-table td { font-size: 12px; padding: 12px 14px; }
      /* Reduce page title at tablet/landscape-phone range */
      .page-head__title { font-size: 26px; }
    }

    /* â”€â”€ Wrap page header earlier so title + button don't crowd â”€â”€ */
    @media (max-width: 600px) {
      .page-head { flex-wrap: wrap; gap: 12px; }
      .btn-stock-order { width: 100%; justify-content: center; }
    }

    @media (max-width: 480px) {
      /* Further reduce title on small phones */
      .page-head__title { font-size: 22px; }
      /* Search full-width on its own row; filters side by side below */
      .search-wrap { flex: 0 0 100%; }
      .filter-select { min-width: 0; width: 100%; }
      .filter-wrap { flex: 1 1 calc(50% - 6px); }
      /* Reduce orders table padding so status badges don't get clipped */
      .orders-table th,
      .orders-table td { padding: 10px 12px; font-size: 12px; }
      /* Footer row becomes vertical */
      .orders-foot { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

  <div id="okuma-header"></div>

  <div class="app-body-shell">
    <div id="okuma-sidebar" data-active="orders"></div>

    <main class="main-area">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="dashboard.html">Home</a>
        <span class="breadcrumb__sep">/</span>
        <span class="breadcrumb__current">My Orders</span>
      </nav>

      <!-- Page header -->
      <div class="page-head">
        <h1 class="page-head__title">My Orders</h1>
        <a href="create-order.html?mode=stock" class="btn-stock-order">
          Stock Order
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>

      <!-- Toolbar -->
      <div class="orders-toolbar">
        <div class="search-wrap">
          <svg class="search-wrap__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="5" stroke="#9E9E9E" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            class="search-input"
            type="search"
            id="orderSearch"
            placeholder="Search by Order #"
            autocomplete="off"
            oninput="applyFilters()"
          />
        </div>
        <div class="filter-wrap">
          <select class="filter-select" id="statusFilter" onchange="applyFilters()">
            <option value="">Filter by Status</option>
            <option value="open">Open</option>
            <option value="processing">Processing</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <svg class="filter-wrap__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M3 5l4 4 4-4" stroke="#717171" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="filter-wrap">
          <select class="filter-select" id="sortFilter" onchange="applyFilters()">
            <option value="newest">Sort by</option>
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
          <svg class="filter-wrap__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M3 5l4 4 4-4" stroke="#717171" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Clear filter bar -->
      <div class="clear-filter-bar" id="clearFilterBar">
        <button class="clear-filter-btn" id="clearFilterBtn" type="button">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <path d="M1 1l8 8M9 1L1 9"/>
          </svg>
          Clear Filter
        </button>
      </div>

      <!-- Orders table -->
      <div class="orders-card">
        <div class="orders-scroll">
          <table class="orders-table" id="ordersTable">
            <thead>
              <tr>
                <th class="col-order">Order #</th>
                <th class="col-date">Date Placed</th>
                <th class="col-items">Items</th>
                <th class="col-total">Total</th>
                <th class="col-status">Status</th>
              </tr>
            </thead>
            <tbody id="ordersTbody">
              <!-- populated by JS -->
            </tbody>
          </table>
        </div>
        <div class="orders-foot">
          <span class="orders-count" id="ordersCount">Showing 0 orders</span>
          <div class="pagination" id="ordersPagination"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- FOOTER -->
  <div id="okuma-auth-footer"></div>
  <script src="auth.js"></script>

  <script src="components.js"></script>
  <script>
    (function () {

      var ALL_ORDERS = [
        { num: 'OKU-2026-00421', date: 'Jun 10, 2026', dateSort: 20260610, items: 3,  total: 1284.50, status: 'shipped',    orderedFor: 'ABC Industries'       },
        { num: 'OKU-2026-00398', date: 'May 28, 2026', dateSort: 20260528, items: 7,  total: 3670.00, status: 'delivered',  orderedFor: 'Delta Components'     },
        { num: 'OKU-2026-00375', date: 'May 15, 2026', dateSort: 20260515, items: 1,  total: 47.80,   status: 'delivered',  orderedFor: null                   },
        { num: 'OKU-2026-00342', date: 'Apr 30, 2026', dateSort: 20260430, items: 2,  total: 612.00,  status: 'cancelled',  orderedFor: 'Franklin Engineering'  },
        { num: 'OKU-2026-00301', date: 'Apr 12, 2026', dateSort: 20260412, items: 5,  total: 2145.00, status: 'processing', orderedFor: null                   },
        { num: 'OKU-2026-00278', date: 'Mar 22, 2026', dateSort: 20260322, items: 4,  total: 890.00,  status: 'delivered',  orderedFor: 'Keystone Precision'    },
        { num: 'OKU-2026-00245', date: 'Mar 05, 2026', dateSort: 20260305, items: 2,  total: 324.50,  status: 'delivered',  orderedFor: null                   },
        { num: 'OKU-2026-00211', date: 'Feb 14, 2026', dateSort: 20260214, items: 6,  total: 4200.00, status: 'delivered',  orderedFor: 'Smith Manufacturing'   },
        { num: 'OKU-2026-00188', date: 'Jan 30, 2026', dateSort: 20260130, items: 3,  total: 765.00,  status: 'delivered',  orderedFor: 'Global Parts Supply'   },
        { num: 'OKU-2026-00154', date: 'Jan 12, 2026', dateSort: 20260112, items: 1,  total: 88.50,   status: 'delivered',  orderedFor: null                   },
        { num: 'OKU-2025-00892', date: 'Dec 19, 2025', dateSort: 20251219, items: 4,  total: 1540.00, status: 'delivered',  orderedFor: 'Apex Machining'        },
        { num: 'OKU-2025-00841', date: 'Nov 28, 2025', dateSort: 20251128, items: 2,  total: 312.00,  status: 'delivered',  orderedFor: null                   },
        { num: 'OKU-2025-00790', date: 'Oct 14, 2025', dateSort: 20251014, items: 5,  total: 2260.00, status: 'delivered',  orderedFor: 'East Coast Tooling'    },
        { num: 'OKU-2025-00733', date: 'Sep 02, 2025', dateSort: 20250902, items: 3,  total: 945.00,  status: 'delivered',  orderedFor: null                   },
        { num: 'OKU-2025-00681', date: 'Aug 20, 2025', dateSort: 20250820, items: 8,  total: 3120.00, status: 'delivered',  orderedFor: 'Century Fabrication'   }
      ];

      var PAGE_SIZE = 8;
      var currentPage = 1;
      var filteredOrders = ALL_ORDERS.slice();

      var BADGE_CLASS = {
        processing: 'status-badge--processing',
        shipped:    'status-badge--shipped',
        delivered:  'status-badge--delivered',
        cancelled:  'status-badge--cancelled'
      };

      function formatTotal(n) {
        return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      function statusBadge(s) {
        var label = s.charAt(0).toUpperCase() + s.slice(1);
        return '<span class="status-badge ' + (BADGE_CLASS[s] || '') + '"><span class="dot"></span>' + label + '</span>';
      }

      function render() {
        var tbody = document.getElementById('ordersTbody');
        var start = (currentPage - 1) * PAGE_SIZE;
        var pageItems = filteredOrders.slice(start, start + PAGE_SIZE);

        if (filteredOrders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No orders found matching your search.</div></td></tr>';
        } else {
          tbody.innerHTML = pageItems.map(function (o) {
            var itemLabel = o.items === 1 ? '1 item' : o.items + ' items';
            return '<tr onclick="window.location=\'order-detail.html?id=' + o.num + '\'">' +
              '<td class="col-order"><span class="order-num-label">' + o.num + '</span></td>' +
              '<td class="col-date">' + o.date + '</td>' +
              '<td class="col-items">' + itemLabel + '</td>' +
              '<td class="col-total"><span class="col-total-val">' + formatTotal(o.total) + '</span></td>' +
              '<td class="col-status">' + statusBadge(o.status) + '</td>' +
              '</tr>';
          }).join('');
        }

        var showing = Math.min(filteredOrders.length, start + PAGE_SIZE) - start;
        var countEl = document.getElementById('ordersCount');
        if (filteredOrders.length === ALL_ORDERS.length) {
          countEl.textContent = 'Showing ' + filteredOrders.length + ' of ' + ALL_ORDERS.length + ' orders';
        } else {
          countEl.textContent = 'Showing ' + filteredOrders.length + ' of ' + ALL_ORDERS.length + ' orders';
        }

        renderPagination();
      }

      function renderPagination() {
        var container = document.getElementById('ordersPagination');
        var totalPages = Math.ceil(filteredOrders.length / PAGE_SIZE);
        if (totalPages <= 1) { container.innerHTML = ''; return; }

        var html = '';

        // Prev button
        html += '<button class="page-btn" id="pgPrev" onclick="goPage(' + (currentPage - 1) + ')"' +
          (currentPage === 1 ? ' disabled' : '') + '>' +
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>';

        // Page numbers
        for (var p = 1; p <= totalPages; p++) {
          var active = p === currentPage;
          html += '<button class="page-btn' + (active ? ' page-btn--active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
        }

        // Next button
        html += '<button class="page-btn" id="pgNext" onclick="goPage(' + (currentPage + 1) + ')"' +
          (currentPage === totalPages ? ' disabled' : '') + '>' +
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>';

        container.innerHTML = html;
      }

      window.goPage = function (p) {
        var totalPages = Math.ceil(filteredOrders.length / PAGE_SIZE);
        if (p < 1 || p > totalPages) return;
        currentPage = p;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      function applyFilters() {
        var query  = (document.getElementById('orderSearch').value || '').toLowerCase().trim();
        var status = document.getElementById('statusFilter').value;
        var sort   = document.getElementById('sortFilter').value;

        filteredOrders = ALL_ORDERS.filter(function (o) {
          var matchQuery  = !query  || o.num.toLowerCase().includes(query) || o.date.toLowerCase().includes(query) || (o.orderedFor && o.orderedFor.toLowerCase().includes(query));
          var matchStatus = !status || (status === 'open' ? (o.status === 'processing' || o.status === 'shipped') : o.status === status);
          return matchQuery && matchStatus;
        });

        if (sort === 'oldest') { filteredOrders.sort(function (a, b) { return a.dateSort - b.dateSort; }); }
        else { filteredOrders.sort(function (a, b) { return b.dateSort - a.dateSort; }); }

        currentPage = 1;
        render();

        var clearBar = document.getElementById('clearFilterBar');
        if (clearBar) clearBar.classList.toggle('visible', !!status);
      }

      window.applyFilters = applyFilters;

      var clearFilterBtn = document.getElementById('clearFilterBtn');
      if (clearFilterBtn) {
        clearFilterBtn.addEventListener('click', function () {
          document.getElementById('statusFilter').value = '';
          applyFilters();
        });
      }

      // Hide Stock Order CTA for non-dealer users
      if (localStorage.getItem('okmUserRole') !== 'dealer') {
        var stockBtn = document.querySelector('.btn-stock-order');
        if (stockBtn) stockBtn.style.display = 'none';
      }

      // Apply filter from URL param (e.g. ?filter=open from dashboard KPI)
      var _urlParam = new URLSearchParams(window.location.search).get('filter');
      if (_urlParam) {
        var sf = document.getElementById('statusFilter');
        if (sf) { sf.value = _urlParam; }
      }

      // Initial render
      applyFilters();

    })();
  </script>

</body>
</html>
