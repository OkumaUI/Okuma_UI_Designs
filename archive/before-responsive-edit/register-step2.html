<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine Verification – Register | Okuma</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F5F5F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #1A1A1A;
    }

    /* CONTENT */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      padding-bottom: 80px;
    }

    /* WIZARD CARD */
    .wizard-card {
      width: 720px;
      box-shadow: 0px 2px 8px 0px rgba(0,0,0,0.08);
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
    }

    /* WIZARD STEP HEADER */
    .wizard-steps {
      height: 80px;
      border-bottom: 1px solid #E0E0E0;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }

    .wizard-step {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .wizard-step__number {
      width: 24px;
      height: 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .wizard-step__number--active {
      background: #005EB8;
      color: #fff;
    }

    .wizard-step__number--inactive {
      background: #F5F5F5;
      color: rgba(49,52,64,0.7);
    }

    .wizard-step__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .wizard-step__label--active {
      color: #005EB8;
    }

    .wizard-step__label--inactive {
      color: rgba(49,52,64,0.7);
    }

    /* WIZARD BODY */
    .wizard-body {
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .wizard-section-title {
      font-size: 20px;
      font-weight: 500;
      color: #2C2A29;
    }

    .wizard-helper-text {
      font-size: 14px;
      color: #9E9E9E;
      line-height: 1.6;
    }

    /* CONTENT CONTAINER */
    .verify-container {
      display: flex;
      flex-direction: column;
    }

    /* SERIAL INPUT ROW */
    .serial-row {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }

    .serial-input {
      flex: 1;
      height: 48px;
      border: 1px solid #9E9E9E;
      border-radius: 4px;
      padding: 0 16px;
      font-size: 14px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #1A1A1A;
      outline: none;
      transition: border 0.15s;
    }

    .serial-input::placeholder {
      color: #757575;
    }

    .serial-input:focus {
      border: 2px solid #005EB8;
    }

    .verify-btn {
      border: 2px solid #005EB8;
      height: 48px;
      padding: 0 20px;
      font-size: 13px;
      font-weight: 700;
      color: #005EB8;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .verify-btn:hover {
      background: #005EB8;
      color: #fff;
    }

    /* ADD ANOTHER LINK */
    .add-machine-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #005EB8;
      text-decoration: none;
      margin-top: 16px;
    }

    .add-machine-link:hover {
      text-decoration: underline;
    }

    /* CTA AREA */
    .cta-area {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      margin-top: 32px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      background: #005EB8;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.7px;
      cursor: pointer;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      transition: background 0.15s;
    }

    .btn-primary:hover {
      background: #004fa0;
    }

    .back-link {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      line-height: normal;
      color: #005EB8;
      text-decoration: none;
      margin-top: 16px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="okuma-auth-header"></div>

  <!-- CONTENT -->
  <main class="content">
    <div class="wizard-card">

      <!-- STEP HEADER -->
      <div class="wizard-steps">
        <div class="wizard-step">
          <div class="wizard-step__number wizard-step__number--inactive">1</div>
          <span class="wizard-step__label wizard-step__label--inactive">Company Details</span>
        </div>
        <div class="wizard-step">
          <div class="wizard-step__number wizard-step__number--active">2</div>
          <span class="wizard-step__label wizard-step__label--active">Machine Verification</span>
        </div>
        <div class="wizard-step">
          <div class="wizard-step__number wizard-step__number--inactive">3</div>
          <span class="wizard-step__label wizard-step__label--inactive">Account Type</span>
        </div>
        <div class="wizard-step">
          <div class="wizard-step__number wizard-step__number--inactive">4</div>
          <span class="wizard-step__label wizard-step__label--inactive">Upload Documents</span>
        </div>
      </div>

      <!-- WIZARD BODY -->
      <div class="wizard-body">

        <div class="wizard-section-title">Machine Verification</div>

        <div class="verify-container">
          <p class="wizard-helper-text">Enter the serial number(s) of your Okuma machine(s) to link them to your account.</p>

          <!-- Serial input row -->
          <div class="serial-row" id="machineList">
            <input class="serial-input" type="text" placeholder="e.g. OKU-2019-M56-0421" aria-label="Machine serial number">
            <button class="verify-btn">VERIFY</button>
          </div>

          <!-- Add another machine -->
          <a href="#" class="add-machine-link" id="addMachineBtn" onclick="return addMachine();">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add another machine
          </a>

          <!-- CTA -->
          <div class="cta-area">
            <button class="btn-primary" onclick="window.location='register-step3.html'">Next: Account Type</button>
            <a href="register-step1.html" class="back-link">← Back</a>
          </div>
        </div>

      </div><!-- /wizard-body -->
    </div><!-- /wizard-card -->
  </main>

  <!-- FOOTER -->
  <div id="okuma-auth-footer"></div>

  <script src="components.js"></script>

  <script>
    // Add another empty serial-number row (machine verify flow)
    function addMachine() {
      var addBtn = document.getElementById('addMachineBtn');
      var row = document.createElement('div');
      row.className = 'serial-row';
      row.style.marginTop = '16px';
      row.innerHTML =
        '<input class="serial-input" type="text" placeholder="e.g. OKU-2019-M56-0421" aria-label="Machine serial number">' +
        '<button class="verify-btn" type="button">VERIFY</button>';
      addBtn.parentNode.insertBefore(row, addBtn);
      return false;
    }
  </script>

</body>
</html>
