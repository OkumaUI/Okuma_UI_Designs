<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results - Okuma Parts Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F9F9F9;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-area { flex: 1; min-width: 0; padding: 32px; overflow-x: hidden; }

    /* ── PAGE HEAD ── */
    .sr-title { font-size: 26px; font-weight: 700; color: #1A1A1A; line-height: 1.2; }

    /* ── COMPATIBILITY PILLS ── */
    .sr-meta { margin-top: 20px; }

    .compat-pills { display: flex; gap: 8px; flex-wrap: wrap; }

    .compat-pill {
      display: inline-flex; align-items: center; gap: 7px;
      height: 36px; padding: 0 16px;
      border: 1.5px solid #DEDEDE; border-radius: 100px;
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px; font-weight: 500; color: #4B4B4B;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .compat-pill:hover:not(.active) { border-color: #005EB8; color: #005EB8; }
    .compat-pill.active {
      background: #005EB8; border-color: #005EB8;
      color: #fff; font-weight: 700;
    }

    .pill-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 18px; padding: 0 5px;
      border-radius: 9px;
      font-size: 11px; font-weight: 700;
      background: rgba(0,0,0,0.10);
    }
    .compat-pill.active .pill-count { background: rgba(255,255,255,0.25); }

    /* ── CARDS GRID ── */
    .cards-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }

    /* ── PART CARD — 3-zone grid ── */
    .part-card {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-left: 3px solid var(--cat-color, #005EB8);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1fr 160px 164px;
      align-items: center;
      transition: box-shadow 0.15s;
      overflow: hidden;
    }
    .part-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.09); }

    /* Zone 1 - Identity */
    .part-card__identity {
      padding: 18px 20px; min-width: 0;
      display: flex; flex-direction: column; gap: 5px;
      border-right: 1px solid #F0F0F0;
    }
    .part-card__pn-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .part-card__pn {
      font-size: 11px; font-weight: 700; color: #005EB8;
      letter-spacing: 0.6px; text-transform: uppercase; flex-shrink: 0;
    }
    .part-card__name {
      font-size: 15px; font-weight: 700; color: #1A1A1A; line-height: 1.3;
    }
    .part-card__attrs {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px;
    }
    .part-card__attr {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 400; color: #6B7280;
    }
    .part-card__attr svg { width: 12px; height: 12px; flex-shrink: 0; color: #9E9E9E; }

    /* "For [machine]" chip — all cards */
    .compat-chip {
      display: inline-flex; align-items: center;
      height: 18px; padding: 0 7px;
      border-radius: 3px;
      background: #F3F4F6; color: #6B7280;
      font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
      white-space: nowrap; flex-shrink: 0;
    }
    .compat-chip--match {
      background: #EBF5FF; color: #005EB8;
    }

    /* Zone 2 - Availability */
    .part-card__avail {
      padding: 18px 16px; display: flex; flex-direction: column;
      align-items: flex-start; gap: 4px;
      border-right: 1px solid #F0F0F0; align-self: stretch; justify-content: center;
    }
    .avail-status { display: flex; align-items: center; gap: 6px; }
    .avail-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .avail-dot--in  { background: #208831; box-shadow: 0 0 0 2px #dcfce7; }
    .avail-dot--out { background: #9E9E9E; box-shadow: 0 0 0 2px #f3f4f6; }
    .avail-text { font-size: 12px; font-weight: 700; }
    .avail-text--in  { color: #208831; }
    .avail-text--out { color: #9E9E9E; }
    .avail-sub { font-size: 11px; font-weight: 400; color: #9E9E9E; line-height: 1.4; padding-left: 13px; }

    /* Zone 3 - Price + CTA */
    .part-card__action {
      padding: 18px 20px; display: flex; flex-direction: column;
      align-items: flex-end; gap: 10px; align-self: stretch; justify-content: center;
    }
    .part-card__price-wrap { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .part-card__price { font-size: 20px; font-weight: 800; color: #1A1A1A; line-height: 1; }
    .part-card__price--sale { color: #AD0000; }
    .part-card__price--original { font-size: 12px; font-weight: 400; color: #6E6E6E; text-decoration: line-through; line-height: 1; }
    .part-card__unit { font-size: 11px; color: #9E9E9E; margin-top: 2px; }

    .add-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: 4px; height: 36px; padding: 0 14px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .add-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .add-btn--cart { background: #005EB8; color: #fff; border: none; }
    .add-btn--cart:hover { background: #0052A3; }
    .add-btn--quote { background: #fff; color: #005EB8; border: 1.5px solid #005EB8; }
    .add-btn--quote:hover { background: #EBF3FF; }
    .add-btn--done { background: #F0FDF4 !important; color: #15803D !important; border: 1.5px solid #86EFAC !important; cursor: default; }
    .add-btn--done:hover { background: #DCFCE7 !important; }

    /* ── Cart Toast (matches parts-catalogue) ── */
    @keyframes toast-in  { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toast-out { from { opacity:1; transform:translateX(0); }   to { opacity:0; transform:translateX(60px); } }
    #cart-toast {
      position: fixed; top: 28px; right: 28px;
      min-width: 300px; max-width: 360px;
      background: #fff; border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.14);
      display: none; flex-direction: row; overflow: hidden; z-index: 2000;
      animation: toast-in 0.28s cubic-bezier(0.22,1,0.36,1);
    }
    #cart-toast.hiding { animation: toast-out 0.22s ease forwards; }
    .toast-accent { width: 5px; flex-shrink: 0; background: #2E7D32; }
    .toast-body { flex: 1; padding: 14px 12px 14px 14px; display: flex; flex-direction: column; gap: 4px; }
    .toast-header { color: #2E7D32; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    #toast-name   { font-size: 14px; font-weight: 700; color: #111; }
    #toast-partnum{ font-size: 14px; font-weight: 400; color: #6E6E6E; }
    #toast-price  { font-size: 16px; font-weight: 700; color: #111; margin-top: 4px; }
    #toast-close  { align-self: flex-start; margin: 10px 10px 0 0; background: none; border: none; cursor: pointer; font-size: 18px; color: #6E6E6E; line-height: 1; padding: 2px 4px; flex-shrink: 0; }
    #toast-close:hover { color: #111; }

    /* ── Quote Modal (matches parts-catalogue) ── */
    .modal-header { height: 60px; background: #005EB8; border-radius: 2px 2px 0 0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
    .modal-header-left { display: flex; align-items: center; gap: 10px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    #quote-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 9999; display: none;
      align-items: center; justify-content: center;
      padding: 16px; overflow-y: auto;
    }
    #quote-modal-overlay.is-open { display: flex; }
    #quote-modal { width: 100%; max-width: 480px; max-height: 90vh; background: #fff; border-radius: 2px; box-shadow: 0 12px 24px rgba(0,0,0,0.25); overflow: auto; margin: auto; }
    .quote-modal__placeholder { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; padding: 40px 32px 36px; }
    .quote-modal__icon { width: 52px; height: 52px; border-radius: 50%; background: #EEF3FF; display: flex; align-items: center; justify-content: center; color: #005EB8; }
    .quote-modal__icon svg { width: 24px; height: 24px; }
    .quote-modal__chip { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #005EB8; background: #EEF3FF; border-radius: 4px; padding: 3px 10px; }
    .quote-modal__title { font-size: 17px; font-weight: 700; color: #1A1A1A; }
    .quote-modal__part-ref { font-size: 12px; color: #717171; background: #F5F5F5; border-radius: 4px; padding: 6px 16px; font-family: 'Courier New', monospace; font-weight: 600; letter-spacing: 0.3px; }
    .quote-modal__body { font-size: 13px; color: #717171; line-height: 1.6; max-width: 320px; }
    .quote-modal__cta { width: 100%; height: 40px; background: #005EB8; color: #fff; border: none; border-radius: 2px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; transition: background 0.15s; margin-top: 4px; }
    .quote-modal__cta:hover { background: #0B308E; }

    /* Empty state */
    .no-results { padding: 48px 20px; text-align: center; font-size: 14px; color: #717171; }

    /* ── PAGINATION ── */
    .pagination {
      display: flex; align-items: center; gap: 4px; margin-top: 24px; justify-content: flex-end;
      flex-wrap: wrap; overflow-x: auto;
    }
    .page-btn {
      min-width: 36px; height: 36px; padding: 0 8px;
      background: #fff; border: 1px solid #E5E5E5; border-radius: 4px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px; font-weight: 500; color: #1A1A1A; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .page-btn:hover:not(:disabled) { border-color: #005EB8; color: #005EB8; }
    .page-btn.active { background: #005EB8; border-color: #005EB8; color: #fff; font-weight: 700; }
    .page-btn:disabled { color: #C4C4C4; border-color: #E5E5E5; cursor: not-allowed; }
    .page-btn--nav { min-width: auto; padding: 0 14px; font-weight: 600; }
    .page-ellipsis { font-size: 13px; color: #9E9E9E; padding: 0 4px; line-height: 36px; }

    img, svg { max-width: 100%; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .main-area { padding: 16px; }
      .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); column-gap: 12px; row-gap: 12px; width: 100%; }
      .part-card { grid-template-columns: 1fr; }
      .part-card__identity { border-right: none; border-bottom: 1px solid #F0F0F0; align-items: center; text-align: center; }
      .part-card__pn-row { justify-content: center; }
      .part-card__attrs { justify-content: center; }
      .part-card__avail { border-right: none; border-bottom: 1px solid #F0F0F0; flex-direction: row; align-items: center; justify-content: center; gap: 16px; }
      .part-card__action { flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
      .part-card__price-wrap { align-items: center; text-align: center; }
    }

    @media (max-width: 640px) { .sr-title { font-size: 22px; } }

    @media (max-width: 480px) {
      .main-area { padding: 12px; }
      .sr-title { font-size: 20px; }
      .part-card__price { font-size: 17px; }
      .pagination { justify-content: center; gap: 2px; }
    }

    @media (max-width: 414px) {
      .cards-grid { display: flex; flex-direction: column; gap: 8px; }
    }
  </style>
</head>

        </button>
      </div>
      <div class="csw-modal__bdy">
        <p id="srMachSwitchBody"></p>
        <div class="csw-modal__div"></div>
        <div class="csw-modal__act">

          <button class="csw-btn csw-btn--confirm" id="srMachSwitchConfirm">Switch &amp; Add to Cart</button>

        { name: 'Spindle Bearing Unit',       number: 'E4809-045-055-D', category: 'Spindle Assembly',   machine: 'MB-56V AII',    price: 247.50, originalPrice: 329.00, inStock: true },
        { name: 'Angular Contact Bearing',    number: 'E4809-045-011-F', category: 'Spindle Assembly',   machine: 'MB-56V AII',    price: 312.00, inStock: true },
        { name: 'Coolant Tank Filter',        number: 'C4809-058-121-B', category: 'Coolant System',     machine: 'MB-56V AII',    price: 49.00,  inStock: true },
        { name: 'Coolant Pump Assembly',      number: 'C4809-045-055-E', category: 'Coolant System',     machine: 'MB-56V AII',    price: 185.00, inStock: true },
        { name: 'Servo Drive Unit',           number: 'A4809-072-102-B', category: 'Axis Drive',         machine: 'MB-56V AII',    price: 342.50, inStock: true },
        { name: 'X-Axis Linear Guide Rail',   number: 'A4809-072-312-C', category: 'Axis Drive',         machine: 'MB-56V AII',    price: 376.00, originalPrice: 450.00, inStock: false },
        { name: 'Control Relay Module',       number: 'EC809-033-014-D', category: 'Electrical Cabinet', machine: 'MB-56V AII',    price: 128.00, inStock: true },
        { name: 'Proximity Sensor',           number: 'EC809-033-046-D', category: 'Electrical Cabinet', machine: 'MB-56V AII',    price: 76.00,  inStock: true },
        { name: 'ATC Cam Follower',           number: 'T4809-091-057-E', category: 'Tooling & Fixtures', machine: 'MB-56V AII',    price: 92.00,  inStock: true },
        { name: 'Tool Presetter Arm',         number: 'T4809-091-019-C', category: 'Tooling & Fixtures', machine: 'MB-56V AII',    price: 155.00, originalPrice: 195.00, inStock: true }
      ];

      var PAGE_SIZE = 6;
      var query        = '';
      var queryFiltered = [];
      var currentPage  = 1;
      var currentTab   = 'all'; /* 'all' | 'compatible' | 'incompatible' */
      var selectedMachine = localStorage.getItem('okmDefaultMachine') || 'LU300-M';

      /* ── cart / quote state ── */
      var _cartParts  = {};
      var _quoteParts = {};

      function lsGetArr(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; } }
      function lsSetArr(key, arr) { try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {} }

      function buildCartSet() {
        var items = lsGetArr('okmCart');
        _cartParts = {};
        for (var i = 0; i < items.length; i++) _cartParts[items[i].number] = true;
      }
      function buildQuoteSet() {
        var items = lsGetArr('okmQuote');
        _quoteParts = {};
        for (var i = 0; i < items.length; i++) _quoteParts[items[i].number] = true;
      }

      function addToCart(p) {
        var items = lsGetArr('okmCart');
        var found = false;
        for (var i = 0; i < items.length; i++) {
          if (items[i].number === p.number) { items[i].qty = (items[i].qty || 1) + 1; found = true; break; }
        }
        if (!found) items.push({ number: p.number, name: p.name, price: p.price, originalPrice: p.originalPrice || null, qty: 1, machine: p.machine, category: p.category });
        lsSetArr('okmCart', items);
        updateCartBadge();
      }

      function addToQuote(p) {
        var items = lsGetArr('okmQuote');
        var found = false;
        for (var i = 0; i < items.length; i++) {
          if (items[i].number === p.number) { items[i].qty = (items[i].qty || 1) + 1; found = true; break; }
        }
        if (!found) items.push({ number: p.number, name: p.name, price: p.price, originalPrice: p.originalPrice || null, qty: 1, machine: p.machine, category: p.category });
        lsSetArr('okmQuote', items);
      }

      function updateCartBadge() {
        var items = lsGetArr('okmCart');
        var count = 0;
        for (var i = 0; i < items.length; i++) count += (items[i].qty || 1);
        var badge = document.querySelector('.nav__cart-badge');
        if (badge) badge.textContent = count > 0 ? count : '0';
      }

      /* ── Cart toast (matches parts-catalogue pattern) ── */
      var _toastTimer = null;

      function showCartToast(part, qty) {
        var q = qty || 1;
        var total = (part.price * q).toFixed(2);
        document.getElementById('toast-name').textContent    = part.name;
        document.getElementById('toast-partnum').textContent = 'Part # ' + part.number;
        document.getElementById('toast-price').textContent   = 'Qty ' + q + '  ×  $' + part.price.toFixed(2) + '  =  $' + total;
        var el = document.getElementById('cart-toast');
        el.classList.remove('hiding');
        el.style.display = 'flex';
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(dismissToast, 8000);
      }

      function dismissToast() {
        var el = document.getElementById('cart-toast');
        el.classList.add('hiding');
        el.addEventListener('animationend', function handler() {
          el.style.display = 'none';
          el.classList.remove('hiding');
          el.removeEventListener('animationend', handler);
        });
      }

      /* ── Quote modal (matches parts-catalogue pattern) ── */
      function openQuoteModal(part) {
        document.getElementById('quote-part-ref').textContent = part.number + ' — ' + part.name;
        document.getElementById('quote-modal-overlay').classList.add('is-open');
        document.body.style.overflow = 'hidden';
      }

      function closeQuoteModal() {
        document.getElementById('quote-modal-overlay').classList.remove('is-open');
        document.body.style.overflow = '';
      }

      /* ── Machine switch modal (cross-machine "Add to Cart" flow) ── */
      var _pendingMachPart = null;
      var _pendingMachBtn  = null;

      function showSrMachSwitchModal(part, btn) {
        _pendingMachPart = part;
        _pendingMachBtn  = btn;
        document.getElementById('srMachSwitchBody').innerHTML =
          'This part is for <strong>' + escapeHtml(part.machine) + '</strong>. Adding it will switch your active machine to ' +
          '<strong>' + escapeHtml(part.machine) + '</strong> and clear your current cart.';
        document.getElementById('srMachSwitchOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function hideSrMachSwitchModal() {
        document.getElementById('srMachSwitchOverlay').classList.remove('open');
        document.body.style.overflow = '';
        _pendingMachPart = null;
        _pendingMachBtn  = null;
      }

      var elGrid = document.getElementById('cardsGrid');
      var elPag  = document.getElementById('pagination');
      var elTitle = document.getElementById('srTitle');

      /* ── helpers ── */
      function getParam(name) {
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
        return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function isCompatible(p) {
        return p.machine === selectedMachine;
      }

      function getTabParts() {
        if (currentTab === 'compatible')   return queryFiltered.filter(isCompatible);
        if (currentTab === 'incompatible') return queryFiltered.filter(function(p) { return !isCompatible(p); });
        return queryFiltered;
      }

      /* ── pills ── */
      function updatePills() {
        var compat   = queryFiltered.filter(isCompatible).length;
        var incompat = queryFiltered.length - compat;
        document.getElementById('pillCountAll').textContent      = queryFiltered.length;
        document.getElementById('pillCountCompat').textContent   = compat;
        document.getElementById('pillCountIncompat').textContent = incompat;
        var pills = document.querySelectorAll('.compat-pill');
        Array.prototype.forEach.call(pills, function(pill) {
          if (pill.dataset.tab === currentTab) pill.classList.add('active');
          else pill.classList.remove('active');
        });
      }

      /* ── card rendering ── */
      var CAT_COLORS = {
        'Spindle Assembly':   '#005EB8',
        'Coolant System':     '#0EA5E9',
        'Axis Drive':         '#7C3AED',
        'Electrical Cabinet': '#F59E0B',
        'Tooling & Fixtures': '#059669'
      };

      function cardHTML(p) {
        var compatible = isCompatible(p);
        var catColor   = compatible ? (CAT_COLORS[p.category] || '#005EB8') : '#BDBDBD';

        var compatChip = compatible
          ? '<span class="compat-chip compat-chip--match">For ' + escapeHtml(selectedMachine) + '</span>'
          : '<span class="compat-chip">For ' + escapeHtml(p.machine) + '</span>';

        var availZone = p.inStock
          ? '<div class="avail-status"><span class="avail-dot avail-dot--in"></span><span class="avail-text avail-text--in">In Stock</span></div>' +
            '<div class="avail-sub">Ships in 1–3 business days</div>'
          : '<div class="avail-status"><span class="avail-dot avail-dot--out"></span><span class="avail-text avail-text--out">Out of Stock</span></div>' +
            '<div class="avail-sub">Contact sales for availability</div>';

        var _checkSVG = '<svg viewBox="0 0 20 20" fill="none"><path d="M4 10l5 5 7-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        var _quoteSVG = '<svg viewBox="0 0 20 20" fill="none"><path d="M10 2H4a1 1 0 00-1 1v14a1 1 0 001 1h12a1 1 0 001-1V8l-6-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 2v6h6M7 13h6M7 10h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
        var _cartSVG  = '<svg viewBox="0 0 20 20" fill="none"><path d="M1 1h2.2l2.1 10.4a1.5 1.5 0 0 0 1.5 1.2h7.6a1.5 1.5 0 0 0 1.47-1.2L19 4.5H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="17" r="1.3" fill="currentColor"/><circle cx="16" cy="17" r="1.3" fill="currentColor"/></svg>';
        var btn;
        if (p.inStock) {
          var _inCart = !!_cartParts[p.number];
          btn = _inCart
            ? '<button class="add-btn add-btn--cart add-btn--done" data-pn="' + escapeHtml(p.number) + '" data-act="cart" type="button">' + _checkSVG + 'In Cart</button>'
            : '<button class="add-btn add-btn--cart" data-pn="' + escapeHtml(p.number) + '" data-act="cart"' + (!compatible ? ' data-cross-machine="true"' : '') + ' type="button">' + _cartSVG + 'Add to Cart</button>';
        } else {
          var _inQuote = !!_quoteParts[p.number];
          btn = _inQuote
            ? '<button class="add-btn add-btn--quote add-btn--done" data-pn="' + escapeHtml(p.number) + '" data-act="quote" type="button">' + _checkSVG + 'In Quote</button>'
            : '<button class="add-btn add-btn--quote" data-pn="' + escapeHtml(p.number) + '" data-act="quote" type="button">' +
                _quoteSVG +
                'Add to Quote</button>';
        }

        return '<div class="part-card" style="--cat-color:' + catColor + '">' +

          '<div class="part-card__identity">' +
            '<div class="part-card__pn-row">' +
              '<div class="part-card__pn">' + escapeHtml(p.number) + '</div>' +
              compatChip +
            '</div>' +
            '<div class="part-card__name">' + escapeHtml(p.name) + '</div>' +
            '<div class="part-card__attrs">' +
              '<span class="part-card__attr">' +
                '<svg viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M4 6h4M4 8h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>' +
                escapeHtml(p.category) +
              '</span>' +
            '</div>' +
          '</div>' +

          '<div class="part-card__avail">' + availZone + '</div>' +

          '<div class="part-card__action">' +
            '<div class="part-card__price-wrap">' +
              (p.originalPrice
                ? '<div class="part-card__price--original">$' + p.originalPrice.toFixed(2) + '</div>' +
                  '<div class="part-card__price part-card__price--sale">$' + p.price.toFixed(2) + '</div>'
                : '<div class="part-card__price">$' + p.price.toFixed(2) + '</div>'
              ) +
              '<div class="part-card__unit">per unit</div>' +
            '</div>' +
            btn +
          '</div>' +

        '</div>';
      }

      function wireAddButtons() {
        var checkSVG = '<svg viewBox="0 0 20 20" fill="none"><path d="M4 10l5 5 7-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        var btns = elGrid.querySelectorAll('.add-btn[data-pn]');
        Array.prototype.forEach.call(btns, function(btn) {
          btn.addEventListener('click', function() {
            if (btn.dataset.busy === '1' || btn.classList.contains('add-btn--done')) return;
            var pn = btn.dataset.pn;
            var part = null;
            for (var i = 0; i < PARTS.length; i++) { if (PARTS[i].number === pn) { part = PARTS[i]; break; } }
            if (!part) return;
            btn.dataset.busy = '1';
            if (btn.dataset.act === 'cart') {
              if (btn.dataset.crossMachine === 'true') {
                btn.dataset.busy = '';
                showSrMachSwitchModal(part, btn);
                return;
              }
              addToCart(part);
              _cartParts[pn] = true;
              btn.classList.add('add-btn--done');
              btn.innerHTML = checkSVG + 'In Cart';
              showCartToast(part, 1);
            } else {
              openQuoteModal(part);
            }
            setTimeout(function() { btn.dataset.busy = ''; }, 400);
          });
        });
      }

      /* ── pagination ── */
      function renderPagination(totalPages) {
        elPag.innerHTML = '';
        if (totalPages <= 1) return;

        function makeBtn(label, page, extra) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'page-btn' + (extra || '');
          if (typeof label === 'string') b.innerHTML = label;
          else b.textContent = label;
          if (page === null) {
            b.disabled = true;
          } else {
            b.addEventListener('click', function() {
              currentPage = page;
              renderResults();
              elPag.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
          }
          return b;
        }

        var prevBtn = makeBtn(
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Previous',
          currentPage > 1 ? currentPage - 1 : null,
          ' page-btn--nav'
        );
        if (currentPage === 1) prevBtn.disabled = true;
        elPag.appendChild(prevBtn);

        var pages = [];
        for (var i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            pages.push(i);
          } else if (pages[pages.length - 1] !== '...') {
            pages.push('...');
          }
        }

        pages.forEach(function(p) {
          if (p === '...') {
            var span = document.createElement('span');
            span.className = 'page-ellipsis';
            span.textContent = '...';
            elPag.appendChild(span);
          } else {
            elPag.appendChild(makeBtn(p, p, p === currentPage ? ' active' : ''));
          }
        });

        var nextBtn = makeBtn(
          'Next <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
          currentPage < totalPages ? currentPage + 1 : null,
          ' page-btn--nav'
        );
        if (currentPage === totalPages) nextBtn.disabled = true;
        elPag.appendChild(nextBtn);
      }

      /* ── render ── */
      function renderResults() {
        buildCartSet();
        buildQuoteSet();
        updatePills();
        var parts = getTabParts();
        var totalPages = Math.max(1, Math.ceil(parts.length / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        var slice = parts.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

        if (slice.length === 0) {
          elGrid.innerHTML = '<div class="no-results">No parts found.</div>';
        } else {
          elGrid.innerHTML = slice.map(cardHTML).join('');
          wireAddButtons();
        }
        renderPagination(totalPages);
      }

      /* ── init ── */
      query = getParam('q').trim();
      if (query) {
        elTitle.textContent = 'Search Results for "' + query + '"';
        var q = query.toLowerCase();
        queryFiltered = PARTS.filter(function(p) {
          return p.name.toLowerCase().indexOf(q) !== -1 ||
                 p.number.toLowerCase().indexOf(q) !== -1 ||
                 p.category.toLowerCase().indexOf(q) !== -1 ||
                 p.machine.toLowerCase().indexOf(q) !== -1;
        });
        if (queryFiltered.length === 0) queryFiltered = PARTS.slice();
      } else {
        elTitle.textContent = 'All Parts';
        queryFiltered = PARTS.slice();
      }

      /* pill click */
      var pills = document.querySelectorAll('.compat-pill');
      Array.prototype.forEach.call(pills, function(pill) {
        pill.addEventListener('click', function() {
          currentTab = pill.dataset.tab;
          currentPage = 1;
          renderResults();
        });
      });

      /* live re-classification when machine changes in header */
      window.addEventListener('okuma:machineChanged', function(e) {
        selectedMachine = e.detail.name;
        currentPage = 1;
        renderResults();
      });

      /* ── static event listeners ── */
      document.getElementById('toast-close').addEventListener('click', dismissToast);

      var _qOverlay = document.getElementById('quote-modal-overlay');
      document.getElementById('quote-modal-close').addEventListener('click', closeQuoteModal);
      document.getElementById('quote-modal-dismiss').addEventListener('click', closeQuoteModal);
      _qOverlay.addEventListener('click', function(e) { if (e.target === _qOverlay) closeQuoteModal(); });

      /* ── machine switch modal listeners ── */
      var _srMachOverlay = document.getElementById('srMachSwitchOverlay');
      document.getElementById('srMachSwitchClose').addEventListener('click', hideSrMachSwitchModal);
      document.getElementById('srMachSwitchCancel').addEventListener('click', hideSrMachSwitchModal);
      _srMachOverlay.addEventListener('click', function(e) { if (e.target === _srMachOverlay) hideSrMachSwitchModal(); });
      document.getElementById('srMachSwitchConfirm').addEventListener('click', function() {
        if (!_pendingMachPart) { hideSrMachSwitchModal(); return; }
        var part = _pendingMachPart;

        /* 1. Clear cart */
        lsSetArr('okmCart', []);

        /* 2. Switch active machine */
        selectedMachine = part.machine;
        localStorage.setItem('okmDefaultMachine', part.machine);

        /* 3. Add the part */
        addToCart(part);

        /* 4. Notify header picker + badge */
        window.dispatchEvent(new CustomEvent('okuma:machineChanged', { detail: { name: part.machine } }));
        updateCartBadge();

        /* 5. Toast */
        showCartToast(part, 1);

        hideSrMachSwitchModal();

        /* 6. Re-render cards to reflect new machine context (renderResults also calls buildCartSet) */
        currentPage = 1;
        renderResults();
      });

      updateCartBadge();
      renderResults();
    })();
  </script>
