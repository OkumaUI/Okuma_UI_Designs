<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail — Okuma Parts Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #FFFFFF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .main-area {
      flex: 1;
      min-width: 0;
      padding: 32px 32px 64px;
      display: flex;
      flex-direction: column;
    }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #717171;
      margin-bottom: 20px;
    }
    .breadcrumb a { color: #717171; text-decoration: none; }
    .breadcrumb a:hover { color: #005EB8; text-decoration: underline; }
    .breadcrumb__sep { color: #C4C4C4; }
    .breadcrumb__current { color: #1A1A1A; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }

    /* PAGE HEADER */
    .page-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .page-head__back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 4px;
      border: 1px solid #DEDEDE;
      background: #fff;
      color: #1A1A1A;
      text-decoration: none;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .page-head__back:hover { border-color: #005EB8; background: #F0F6FF; color: #005EB8; }
    .page-head__back svg { width: 16px; height: 16px; }
    .page-head__info { flex: 1; min-width: 0; }
    .page-head__title { font-size: 24px; font-weight: 800; color: #1A1A1A; letter-spacing: -0.3px; }
    .page-head__meta { font-size: 13px; color: #717171; margin-top: 3px; display: block; }

    /* STATUS BADGES */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 2px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-badge--processing { background: #FFF9EF; border: 0.5px solid #FFB549; color: #FFB549; }
    .status-badge--processing .dot { background: #FFB549; }
    .status-badge--shipped    { background: #F0FCFD; border: 0.5px solid #68D2DF; color: #68D2DF; }
    .status-badge--shipped .dot { background: #68D2DF; }
    .status-badge--delivered  { background: #F4F9F1; border: 0.5px solid #74AA50; color: #74AA50; }
    .status-badge--delivered .dot { background: #74AA50; }
    .status-badge--cancelled  { background: #F5F5F5; border: 0.5px solid #9E9E9E; color: #9E9E9E; }
    .status-badge--cancelled .dot { background: #9E9E9E; }

    /* CANCELLED BANNER */
    .cancelled-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #FFF5F5;
      border: 1px solid #FFC9C9;
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #C0392B;
      margin-bottom: 20px;
    }

    /* TIMELINE */
    .timeline-card {
      border: 1px solid #DEDEDE;
      border-radius: 4px;
      padding: 28px 40px;
      margin-bottom: 20px;
    }
    .timeline {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .timeline-track {
      position: absolute;
      top: 13px;
      left: 14px;
      right: 14px;
      height: 2px;
      background: #EBEBEB;
      z-index: 0;
    }
    .timeline-track__fill { height: 100%; background: #005EB8; }
    .timeline-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      position: relative;
      z-index: 1;
    }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fff;
      border: 2px solid #DEDEDE;
    }
    .step-dot--done    { background: #005EB8; border-color: #005EB8; color: #fff; }
    .step-dot--active  { background: #005EB8; border-color: #005EB8; color: #fff; box-shadow: 0 0 0 4px rgba(0,94,184,0.14); }
    .step-dot--pending { background: #fff; border-color: #DEDEDE; color: #BDBDBD; }
    .step-label { font-size: 12px; font-weight: 600; color: #9E9E9E; text-align: center; line-height: 1.3; }
    .step-label--done, .step-label--active { color: #1A1A1A; }
    .step-date { font-size: 11px; color: #B0B0B0; text-align: center; line-height: 1.3; margin-top: -4px; }
    .step-date--done, .step-date--active { color: #717171; }

    /* TWO COLUMN */
    .detail-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .detail-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .detail-aside {
      width: 308px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* CARDS */
    .det-card { border: 1px solid #DEDEDE; border-radius: 4px; overflow: hidden; }
    .det-card__head {
      padding: 12px 20px;
      background: #F5F5F5;
      border-bottom: 1px solid #DEDEDE;
      font-size: 11px;
      font-weight: 700;
      color: #717171;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .det-card__body { padding: 20px; }

    /* ITEMS TABLE */
    .items-tbl { width: 100%; border-collapse: collapse; min-width: 520px; }
    .items-tbl th {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 700;
      color: #9E9E9E;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-align: left;
      border-bottom: 1px solid #DEDEDE;
      white-space: nowrap;
      background: #FAFAFA;
    }
    .items-tbl th.r { text-align: right; }
    .items-tbl td {
      padding: 14px 16px;
      border-bottom: 1px solid #F0F0F0;
      vertical-align: middle;
      font-size: 13px;
    }
    .items-tbl tbody tr:last-child td { border-bottom: none; }
    .items-tbl tbody tr:hover { background: #FAFAFA; }

    .it-name  { font-size: 13px; font-weight: 700; color: #1A1A1A; }
    .it-pn    { font-size: 11px; color: #9E9E9E; margin-top: 2px; }
    .it-mach  { font-size: 12px; color: #4B4B4B; font-weight: 500; }
    .it-ser   { font-size: 11px; color: #9E9E9E; margin-top: 1px; }
    .r        { text-align: right; }
    .it-linetotal { font-size: 13px; font-weight: 700; color: #1A1A1A; }

    .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ORDER SUMMARY CARD */
    .sum-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; font-size: 13px;
    }
    .sum-row__lbl { color: #717171; }
    .sum-row__val { font-weight: 500; color: #1A1A1A; }
    .sum-row__val--green { color: #74AA50; font-weight: 600; }
    .sum-divider  { height: 1px; background: #DEDEDE; margin: 10px 0; }
    .sum-total {
      display: flex; justify-content: space-between; align-items: center; padding: 4px 0;
    }
    .sum-total__lbl { font-size: 14px; font-weight: 700; color: #1A1A1A; }
    .sum-total__val { font-size: 20px; font-weight: 800; color: #005EB8; }

    /* INFO ROWS */
    .info-row {
      display: flex; flex-direction: column; gap: 2px;
      padding: 10px 0; border-bottom: 1px solid #F0F0F0;
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row:first-child { padding-top: 0; }
    .info-lbl { font-size: 11px; font-weight: 700; color: #9E9E9E; text-transform: uppercase; letter-spacing: 0.4px; }
    .info-val { font-size: 13px; color: #1A1A1A; line-height: 1.5; }
    .info-val--muted { color: #717171; }

    .tracking-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 700; color: #005EB8; text-decoration: none;
    }
    .tracking-link:hover { text-decoration: underline; }

    /* ACTIONS */
    .action-stack { display: flex; flex-direction: column; gap: 10px; }
    .btn-det {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 40px; border-radius: 2px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; border: 1.5px solid transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-det--primary { background: #005EB8; color: #fff; border-color: #005EB8; }
    .btn-det--primary:hover { background: #0B308E; border-color: #0B308E; }
    .btn-det--outline { background: #fff; color: #005EB8; border-color: #005EB8; }
    .btn-det--outline:hover { background: #F0F6FF; }
    .btn-det svg { width: 14px; height: 14px; flex-shrink: 0; }
    .support-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 13px; color: #717171; text-decoration: none; padding: 6px 0;
    }
    .support-link:hover { color: #005EB8; }

    img, svg { max-width: 100%; }

    /* RESPONSIVE */
    @media (min-width: 769px) and (max-width: 1199px) {
      .main-area { padding: 24px 24px 48px; }
      .detail-aside { width: 268px; }
    }
    @media (max-width: 900px) {
      .detail-layout { flex-direction: column; }
      .detail-aside { width: 100%; }
    }
    @media (max-width: 768px) {
      .main-area { padding: 16px 16px 48px; }
      .timeline-card { padding: 20px 16px; }
      .page-head__title { font-size: 20px; }
    }
    @media (max-width: 600px) {
      .page-head { flex-wrap: wrap; gap: 10px; }
    }
    @media (max-width: 480px) {
      .page-head__title { font-size: 18px; }
      .step-date { display: none; }
    }
  </style>
</head>

      document.getElementById('pgTitle').textContent = o.num;
      document.getElementById('pgMeta').textContent =
        'Placed ' + o.date + (o.orderedFor ? ' · For ' + o.orderedFor : '');
      document.getElementById('pgBadge').innerHTML = badge(o.status);

      var html = '';

      if (o.status === 'cancelled') {
        html += '<div class="cancelled-banner">' +
          '<svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><circle cx="7.5" cy="7.5" r="6.5" stroke="#C0392B" stroke-width="1.4"/><path d="M7.5 4.5v3.5" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round"/><circle cx="7.5" cy="10.5" r="0.75" fill="#C0392B"/></svg>' +
          'This order was cancelled. Items were not shipped. Contact support if you need assistance.' +
          '</div>';
      }

      html += renderTimeline(o);

      html += '<div class="detail-layout">';
      html += '<div class="detail-main">' + renderItems(o) + renderShipping(o) + '</div>';
      html += '<div class="detail-aside">' + renderSummary(o) + renderInfo(o) + renderActions(o) + '</div>';
      html += '</div>';

      document.getElementById('orderContent').innerHTML = html;
    }

    function renderTimeline(o) {
      var steps = o.steps;
      var activeIdx = 0;
      for (var i = 0; i < steps.length; i++) {
        if (steps[i].s === 'done' || steps[i].s === 'active') activeIdx = i;
      }
      var pct = o.status === 'cancelled' ? 0 : (activeIdx / (steps.length - 1)) * 100;

      var stepsHTML = steps.map(function(st) {
        var dc = 'step-dot', lc = 'step-label', dtc = 'step-date', inner = '';
        if (st.s === 'done') {
          dc += ' step-dot--done'; lc += ' step-label--done'; dtc += ' step-date--done';
          inner = checkIcon();
        } else if (st.s === 'active') {
          dc += ' step-dot--active'; lc += ' step-label--active'; dtc += ' step-date--active';
          inner = dotIcon('#fff');
        } else {
          dc += ' step-dot--pending';
          inner = dotIcon('#DEDEDE');
        }
        return '<div class="timeline-step">' +
          '<div class="' + dc + '">' + inner + '</div>' +
          '<span class="' + lc + '">' + st.label + '</span>' +
          '<span class="' + dtc + '">' + st.date + '</span>' +
          '</div>';
      }).join('');

      return '<div class="timeline-card">' +
        '<div class="timeline">' +
        '<div class="timeline-track"><div class="timeline-track__fill" style="width:' + pct + '%"></div></div>' +
        stepsHTML +
        '</div></div>';
    }

    function renderItems(o) {
      var rows = o.items.map(function(it) {
        var lineTotal = it.qty * it.price;
        return '<tr>' +
          '<td><div class="it-name">' + it.name + '</div><div class="it-pn">P/N: ' + it.pn + '</div></td>' +
          '<td><div class="it-mach">' + it.mach + '</div><div class="it-ser">' + it.ser + '</div></td>' +
          '<td class="r" style="width:50px"><span>' + it.qty + '</span></td>' +
          '<td class="r" style="width:95px"><span style="color:#4B4B4B">' + fmt(it.price) + '</span></td>' +
          '<td class="r" style="width:95px"><span class="it-linetotal">' + fmt(lineTotal) + '</span></td>' +
          '</tr>';
      }).join('');

      return '<div class="det-card">' +
        '<div class="det-card__head">Items Ordered (' + o.items.length + ')</div>' +
        '<div class="tbl-scroll">' +
        '<table class="items-tbl">' +
        '<thead><tr>' +
        '<th>Part</th>' +
        '<th style="width:160px">Machine</th>' +
        '<th class="r" style="width:50px">Qty</th>' +
        '<th class="r" style="width:95px">Unit Price</th>' +
        '<th class="r" style="width:95px">Total</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '</div></div>';
    }

    function renderShipping(o) {
      var s = o.ship;
      if (!s) return '';
      var html = '<div class="det-card"><div class="det-card__head">Shipping Details</div><div class="det-card__body">';

      html += '<div class="info-row">' +
        '<span class="info-lbl">Ship To</span>' +
        '<span class="info-val">' + s.addr.name + '</span>' +
        '<span class="info-val info-val--muted">' + s.addr.street + '</span>' +
        '<span class="info-val info-val--muted">' + s.addr.city + '</span>' +
        '</div>';

      html += '<div class="info-row"><span class="info-lbl">Shipping Method</span><span class="info-val">' + s.method + '</span></div>';

      if (s.tracking) {
        html += '<div class="info-row"><span class="info-lbl">Tracking Number</span>' +
          '<a class="tracking-link" href="#" onclick="return false;">' + s.tracking + ' ' + extIcon() + '</a>' +
          '</div>';
      }

      if (s.shippedDate) {
        html += '<div class="info-row"><span class="info-lbl">Shipped On</span><span class="info-val">' + s.shippedDate + '</span></div>';
      }

      if (s.estDelivery || s.deliveredDate) {
        var isDelivered = o.status === 'delivered';
        html += '<div class="info-row"><span class="info-lbl">' + (isDelivered ? 'Delivered On' : 'Est. Delivery') + '</span>' +
          '<span class="info-val">' + (isDelivered && s.deliveredDate ? s.deliveredDate : (s.estDelivery || '—')) + '</span></div>';
      }

      html += '</div></div>';
      return html;
    }

    function renderSummary(o) {
      var s = o.sum;
      var html = '<div class="det-card"><div class="det-card__head">Order Summary</div><div class="det-card__body">';
      html += '<div class="sum-row"><span class="sum-row__lbl">Subtotal (' + o.items.length + ' item' + (o.items.length !== 1 ? 's' : '') + ')</span><span class="sum-row__val">' + fmt(s.subtotal) + '</span></div>';
      html += '<div class="sum-row"><span class="sum-row__lbl">Shipping</span><span class="' + (s.shipping > 0 ? 'sum-row__val' : 'sum-row__val sum-row__val--green') + '">' + (s.shipping > 0 ? fmt(s.shipping) : 'Free') + '</span></div>';
      if (s.tax > 0) {
        html += '<div class="sum-row"><span class="sum-row__lbl">Tax</span><span class="sum-row__val">' + fmt(s.tax) + '</span></div>';
      }
      html += '<div class="sum-divider"></div>';
      html += '<div class="sum-total"><span class="sum-total__lbl">Total</span><span class="sum-total__val">' + fmt(s.total) + '</span></div>';
      html += '</div></div>';
      return html;
    }

    function renderInfo(o) {
      var html = '<div class="det-card"><div class="det-card__head">Order Info</div><div class="det-card__body">';
      html += '<div class="info-row"><span class="info-lbl">Order Date</span><span class="info-val">' + o.date + '</span></div>';
      html += '<div class="info-row"><span class="info-lbl">Order Number</span><span class="info-val">' + o.num + '</span></div>';
      if (o.orderedFor) {
        html += '<div class="info-row"><span class="info-lbl">Ordered For</span><span class="info-val">' + o.orderedFor + '</span></div>';
      }
      if (o.poRef) {
        html += '<div class="info-row"><span class="info-lbl">PO Reference</span><span class="info-val">' + o.poRef + '</span></div>';
      }
      html += '<div class="info-row"><span class="info-lbl">Placed By</span><span class="info-val">' + o.placedBy + '</span></div>';
      html += '</div></div>';
      return html;
    }

    function renderActions(o) {
      var html = '<div class="action-stack">';
      html += '<a href="#" class="btn-det btn-det--outline" onclick="return false;">' + dlIcon() + 'Download Invoice</a>';
      if (o.status === 'delivered') {
        html += '<button class="btn-det btn-det--primary" onclick="window.location=\'create-order.html\'">' + reorderIcon() + 'Reorder Items</button>';
      }
      html += '<a href="#" class="support-link" onclick="return false;">' +
        '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M6.5 6v2M6.5 4a1 1 0 1 1 0 2.01"/></svg>' +
        'Contact Support' +
        '</a>';
      html += '</div>';
      return html;
    }

    /* ─── INIT ─────────────────────────────────────────── */
    var id = new URLSearchParams(window.location.search).get('id');
    var order = id && DATA[id];
    render(order || DATA['OKU-2026-00421']);

  })();
  </script>

</body>
</html>
